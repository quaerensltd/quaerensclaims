<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intake Detail | Quaerens</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { background: white; border: 1px solid #dbeafe; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .label { display: block; font-size: 0.95rem; font-weight: 700; color: #1e3a8a; margin-bottom: 0.4rem; }
    .value { font-size: 0.95rem; color: #1f2937; line-height: 1.6; word-break: break-word; }
    .input { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 0.75rem 0.9rem; }
    .btn { border-radius: 12px; padding: 0.8rem 1rem; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #eff6ff; color: #1d4ed8; }
    .btn-secondary:hover { background: #dbeafe; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="authLoader" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-600 font-medium">Loading submission...</p>
    </div>
  </div>

  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-extrabold text-blue-900">Quaerens Intake Detail</h1>
          <p class="text-sm text-slate-500">Secure submission review and assessment workflow</p>
        </div>
        <div class="flex items-center gap-3">
          <a href="/manager-panel.html" class="btn btn-secondary py-2 px-4">Back to Panel</a>
          <button id="logoutBtn" class="btn btn-secondary py-2 px-4 hidden" type="button">Log Out</button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
      <section class="card p-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div>
            <h2 class="text-xl font-extrabold text-blue-900" id="detailTitle">Submission Detail</h2>
            <p class="text-slate-500 mt-1" id="detailSubtitle">Loading...</p>
          </div>
          <div class="text-sm text-slate-500">
            <div id="submittedByText"></div>
            <div id="submittedAtText"></div>
            <div id="linkedLeadText"></div>
          </div>
        </div>
      </section>

      <section class="grid lg:grid-cols-2 gap-6">
        <div class="card p-6">
          <h3 class="text-lg font-extrabold text-blue-900 mb-4">Client Details</h3>
          <div class="grid md:grid-cols-2 gap-4">
            <div><span class="label">First Name</span><div class="value" id="client_firstName">-</div></div>
            <div><span class="label">Second Name</span><div class="value" id="client_secondName">-</div></div>
            <div><span class="label">First Name 2</span><div class="value" id="client_firstName2">-</div></div>
            <div><span class="label">Second Name 2</span><div class="value" id="client_secondName2">-</div></div>
            <div><span class="label">Landline</span><div class="value" id="client_landline">-</div></div>
            <div><span class="label">Mobile</span><div class="value" id="client_mobile">-</div></div>
            <div><span class="label">Email</span><div class="value" id="client_email">-</div></div>
            <div class="md:col-span-2"><span class="label">Address</span><div class="value" id="client_address">-</div></div>
          </div>
        </div>

        <div class="card p-6">
          <h3 class="text-lg font-extrabold text-blue-900 mb-4">Review Actions</h3>
          <div class="space-y-4">
            <div>
              <label class="label" for="statusSelect">Status</label>
              <select id="statusSelect" class="input">
                <option value="draft">Draft</option>
                <option value="submitted">Awaiting Review</option>
                <option value="in_review">In Review</option>
                <option value="assessment_complete">Assessment Complete</option>
              </select>
            </div>

            <div>
              <label class="label" for="assessmentOutcome">Assessment Outcome</label>
              <select id="assessmentOutcome" class="input">
                <option value="">Select outcome</option>
                <option value="strong_case">Strong Case</option>
                <option value="possible_case">Possible Case</option>
                <option value="needs_documents">Needs More Documents</option>
                <option value="not_viable">Not Viable</option>
              </select>
            </div>

            <div>
              <label class="label" for="recommendedCloser">Recommended Closer</label>
              <input id="recommendedCloser" class="input" type="text" placeholder="Optional recommendation" />
            </div>

            <div>
              <label class="label" for="managerNotes">Manager Notes</label>
              <textarea id="managerNotes" class="input" rows="6" placeholder="Internal review notes, observations, missing documents, next actions..."></textarea>
            </div>

            <div>
              <label class="label" for="assessmentSummary">Manager Assessment Report</label>
              <textarea id="assessmentSummary" class="input" rows="18" placeholder="Structured manager assessment report will auto-generate from intake data."></textarea>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
              <button id="generateAssessmentBtn" class="btn btn-secondary" type="button">Generate Assessment Report</button>
              <button id="saveReviewBtn" class="btn btn-primary" type="button">Save Review</button>
              <button id="createAssessmentBtn" class="btn btn-secondary" type="button">Create / Open Assessment</button>
            </div>

            <p id="saveMessage" class="text-sm text-green-700 hidden"></p>
          </div>
        </div>
      </section>

      <section class="card p-6">
        <h3 class="text-lg font-extrabold text-blue-900 mb-4">Product One</h3>
        <div class="grid md:grid-cols-2 gap-4" id="product1Fields"></div>
      </section>

      <section class="card p-6">
        <h3 class="text-lg font-extrabold text-blue-900 mb-4">Product Two</h3>
        <div class="grid md:grid-cols-2 gap-4" id="product2Fields"></div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      getDocs,
      updateDoc,
      addDoc,
      collection,
      query,
      where,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authLoader = document.getElementById("authLoader");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusSelect = document.getElementById("statusSelect");
    const assessmentOutcome = document.getElementById("assessmentOutcome");
    const recommendedCloser = document.getElementById("recommendedCloser");
    const managerNotes = document.getElementById("managerNotes");
    const assessmentSummary = document.getElementById("assessmentSummary");
    const saveReviewBtn = document.getElementById("saveReviewBtn");
    const generateAssessmentBtn = document.getElementById("generateAssessmentBtn");
    const createAssessmentBtn = document.getElementById("createAssessmentBtn");
    const saveMessage = document.getElementById("saveMessage");

    const params = new URLSearchParams(window.location.search);
    const submissionId = params.get("id");

    let currentUser = null;
    let currentUserData = null;
    let submissionData = null;
    let linkedLead = null;

    function hideLoader() {
      if (authLoader) authLoader.style.display = "none";
    }

    function formatDate(timestamp) {
      if (!timestamp) return "-";
      try {
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return d.toLocaleString("en-GB");
      } catch {
        return "-";
      }
    }

    function formatClaimType(type) {
      switch (type) {
        case "solar": return "Solar Panel Claims";
        case "mortgage": return "Mortgage Review";
        case "survey": return "Survey Review";
        case "newbuild": return "New Build Issues";
        default: return type || "-";
      }
    }

    function setValue(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value || "-";
    }

    function renderFieldGrid(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container) return;

      container.innerHTML = "";
      const entries = Object.entries(data || {}).filter(([_, value]) => {
        return value !== undefined && value !== null && String(value).trim() !== "";
      });

      if (!entries.length) {
        container.innerHTML = `<div class="value">No data available.</div>`;
        return;
      }

      entries.forEach(([key, value]) => {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = `
          <span class="label">${key.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase())}</span>
          <div class="value">${value || "-"}</div>
        `;
        container.appendChild(wrapper);
      });
    }

    function clientFullName(client) {
      return `${client?.firstName || ""} ${client?.secondName || ""}`.trim() || "Client";
    }

    function formatBooleanish(value) {
      if (value === true) return "Yes";
      if (value === false) return "No";
      if (value === null || value === undefined || String(value).trim() === "") return "Not confirmed";
      return String(value);
    }

    function formatProductData(product, label) {
      const entries = Object.entries(product || {}).filter(([_, value]) => {
        return value !== undefined && value !== null && String(value).trim() !== "";
      });

      if (!entries.length) return `${label}: No product details supplied.`;

      const lines = entries.map(([key, value]) => {
        const prettyKey = key.replace(/([A-Z])/g, " $1").replace(/^./, c => c.toUpperCase());
        return `- ${prettyKey}: ${value}`;
      });

      return `${label}\n${lines.join("\n")}`;
    }

    function buildStructuredAssessmentReport(data) {
      const client = data.client || {};
      const product1 = data.product1 || {};
      const product2 = data.product2 || {};
      const claimType = formatClaimType(data.claimType);
      const fullName = clientFullName(client);
      const address = client.address || "-";

      const product1Text = formatProductData(product1, "Product One");
      const product2Text = formatProductData(product2, "Product Two");

      const keyIssues = [];
      const strategyPoints = [];
      const missingItems = [];

      const combinedProducts = [product1, product2].filter(p => Object.keys(p || {}).length);

      combinedProducts.forEach((product, index) => {
        const label = index === 0 ? "Product one" : "Product two";

        if (formatBooleanish(product.soldAsInvestment).toLowerCase() === "yes") {
          keyIssues.push(`${label} appears to have been sold as an investment-style proposition.`);
        }

        if (formatBooleanish(product.soldAsWayToDecreaseBills).toLowerCase() === "yes") {
          keyIssues.push(`${label} was represented as a route to reducing household bills.`);
        }

        if (formatBooleanish(product.receivingReturns).toLowerCase() === "yes") {
          keyIssues.push(`${label} includes an expectation of returns which should be checked against actual performance.`);
        }

        if (formatBooleanish(product.additionalCosts).toLowerCase() === "yes") {
          keyIssues.push(`${label} appears to have involved additional costs beyond the initial presentation.`);
        }

        if (formatBooleanish(product.mcsCertificate).toLowerCase() !== "yes") {
          missingItems.push(`${label} MCS documentation should be confirmed.`);
        }

        if (formatBooleanish(product.docs).toLowerCase() !== "yes") {
          missingItems.push(`${label} supporting documents should be obtained.`);
        }

        if (formatBooleanish(product.finance).toLowerCase() === "yes") {
          strategyPoints.push(`${label} may provide an additional finance-related complaint route if lending paperwork exists.`);
        }

        if ((product.companyStatus || "").toLowerCase().includes("dissolved") || (product.companyStatus || "").toLowerCase().includes("strikeoff")) {
          strategyPoints.push(`${label} supplier appears inactive or insolvent, so alternative recovery routes should be considered.`);
        }
      });

      if (!keyIssues.length) {
        keyIssues.push("Initial review indicates a potentially arguable claim, but a fuller document check is still needed.");
      }

      if (!strategyPoints.length) {
        strategyPoints.push("Review supplier representations, performance evidence, supporting paperwork, and any finance or third-party involvement.");
      }

      if (!missingItems.length) {
        missingItems.push("Obtain full contract pack, payment proof, and any supporting correspondence where not already held.");
      }

      const report = `QUAERENS MANAGER ASSESSMENT REPORT

Client Name:
${fullName}

Claim Type:
${claimType}

Contact Details:
Telephone: ${client.mobile || client.landline || "-"}
Email: ${client.email || "-"}
Address: ${address}

1. CASE SUMMARY
This intake concerns ${fullName} in relation to a potential ${claimType} matter. The information currently supplied suggests that representations were made at point of sale which may now require closer examination against the client’s actual experience, documentation held, and any financial loss or detriment suffered.

2. CLIENT AND PRODUCT OVERVIEW
${product1Text}

${product2Text}

3. KEY COMPLAINT INDICATORS
${keyIssues.map(item => `- ${item}`).join("\n")}

4. INITIAL CASE VIEW
On the information currently available, this matter appears suitable for manager review and structured qualification. The case may be strengthened by contract documents, invoices, proof of payment, projections, technical certificates, correspondence, and any evidence of underperformance or additional loss.

5. STRATEGIC REVIEW POINTS
${strategyPoints.map(item => `- ${item}`).join("\n")}

6. DOCUMENTS / EVIDENCE TO CONFIRM
${missingItems.map(item => `- ${item}`).join("\n")}

7. RECOMMENDED NEXT STEP
Recommended next step is to complete manager review, confirm the commercial position, and determine whether the file should proceed to closer for client discussion and onboarding.

8. MANAGER NOTES
${(data.managerNotes || "").trim() || "No manager notes entered yet."}
`;

      return report.trim();
    }

    async function findLinkedLead() {
      linkedLead = null;

      const possibleQueries = [
        query(collection(db, "leadAssignments"), where("convertedToSubmissionId", "==", submissionId)),
        query(collection(db, "leadAssignments"), where("submissionId", "==", submissionId)),
        query(collection(db, "leadAssignments"), where("claimSubmissionId", "==", submissionId)),
        query(collection(db, "leadAssignments"), where("intakeSubmissionId", "==", submissionId))
      ];

      for (const q of possibleQueries) {
        try {
          const snap = await getDocs(q);
          if (!snap.empty) {
            linkedLead = { id: snap.docs[0].id, ...snap.docs[0].data() };
            return linkedLead;
          }
        } catch (error) {
          console.error("Linked lead lookup failed:", error);
        }
      }

      return null;
    }

    async function findExistingAssessment() {
      const q = query(collection(db, "managerAssessments"), where("submissionId", "==", submissionId));
      const snap = await getDocs(q);
      if (snap.empty) return null;

      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      docs.sort((a, b) => {
        const aTime = a.updatedAt?.toDate ? a.updatedAt.toDate().getTime() : (a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0);
        const bTime = b.updatedAt?.toDate ? b.updatedAt.toDate().getTime() : (b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0);
        return bTime - aTime;
      });

      return docs[0];
    }

    async function checkAccess(user) {
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        alert("No staff profile found for this account.");
        window.location.href = "/login.html";
        return false;
      }

      const userData = userSnap.data();
      const role = userData.role;

      if (role !== "staff" && role !== "manager") {
        alert("You do not have permission to access this page.");
        window.location.href = "/login.html";
        return false;
      }

      currentUser = user;
      currentUserData = userData;
      logoutBtn.classList.remove("hidden");
      return true;
    }

    async function loadSubmission() {
      if (!submissionId) {
        alert("Missing submission ID.");
        window.location.href = "/manager-panel.html";
        return;
      }

      const submissionRef = doc(db, "claimSubmissions", submissionId);
      const submissionSnap = await getDoc(submissionRef);

      if (!submissionSnap.exists()) {
        alert("Submission not found.");
        window.location.href = "/manager-panel.html";
        return;
      }

      submissionData = { id: submissionSnap.id, ...submissionSnap.data() };

      await findLinkedLead();
      const existingAssessment = await findExistingAssessment();

      document.getElementById("detailTitle").textContent = formatClaimType(submissionData.claimType);
      document.getElementById("detailSubtitle").textContent = `Submission ID: ${submissionId}`;
      document.getElementById("submittedByText").textContent = `Submitted by: ${submissionData.submittedBy?.name || submissionData.submittedBy?.email || "-"}`;
      document.getElementById("submittedAtText").textContent = `Received: ${formatDate(submissionData.createdAt)}`;
      document.getElementById("linkedLeadText").textContent = `Linked lead: ${linkedLead?.id || "-"}`;

      setValue("client_firstName", submissionData.client?.firstName);
      setValue("client_secondName", submissionData.client?.secondName);
      setValue("client_firstName2", submissionData.client?.firstName2);
      setValue("client_secondName2", submissionData.client?.secondName2);
      setValue("client_landline", submissionData.client?.landline);
      setValue("client_mobile", submissionData.client?.mobile);
      setValue("client_email", submissionData.client?.email);
      setValue("client_address", submissionData.client?.address);

      statusSelect.value = submissionData.status || "submitted";
      managerNotes.value = submissionData.managerNotes || existingAssessment?.managerNotes || "";
      assessmentOutcome.value = submissionData.assessmentOutcome || existingAssessment?.assessmentOutcome || "";
      recommendedCloser.value = submissionData.recommendedCloser || existingAssessment?.recommendedCloser || "";

      const autoReport = buildStructuredAssessmentReport({
        ...submissionData,
        managerNotes: managerNotes.value
      });

      assessmentSummary.value =
        submissionData.generatedAssessmentText ||
        submissionData.assessmentSummary ||
        existingAssessment?.generatedAssessmentText ||
        existingAssessment?.assessmentSummary ||
        autoReport;

      renderFieldGrid("product1Fields", submissionData.product1);
      renderFieldGrid("product2Fields", submissionData.product2);

      hideLoader();
    }

    generateAssessmentBtn.addEventListener("click", () => {
      try {
        const report = buildStructuredAssessmentReport({
          ...submissionData,
          managerNotes: managerNotes.value
        });
        assessmentSummary.value = report;
        saveMessage.textContent = "Assessment report generated.";
        saveMessage.classList.remove("hidden");
        setTimeout(() => saveMessage.classList.add("hidden"), 2500);
      } catch (error) {
        console.error("Failed generating assessment:", error);
        alert("Could not generate assessment report.");
      }
    });

    saveReviewBtn.addEventListener("click", async () => {
      try {
        await updateDoc(doc(db, "claimSubmissions", submissionId), {
          status: statusSelect.value,
          managerNotes: managerNotes.value,
          assessmentSummary: assessmentSummary.value,
          generatedAssessmentText: assessmentSummary.value,
          assessmentOutcome: assessmentOutcome.value,
          recommendedCloser: recommendedCloser.value.trim(),
          reviewedAt: serverTimestamp(),
          reviewedBy: {
            uid: currentUser.uid,
            email: currentUser.email || "",
            name: currentUserData.name || ""
          }
        });

        saveMessage.textContent = "Review saved successfully.";
        saveMessage.classList.remove("hidden");
        setTimeout(() => saveMessage.classList.add("hidden"), 3000);
      } catch (error) {
        console.error("Failed to save review:", error);
        alert("Could not save review.");
      }
    });

    createAssessmentBtn.addEventListener("click", async () => {
      try {
        let reportText = assessmentSummary.value.trim();

        if (!reportText) {
          reportText = buildStructuredAssessmentReport({
            ...submissionData,
            managerNotes: managerNotes.value
          });
          assessmentSummary.value = reportText;
        }

        const basePayload = {
          submissionId,
          leadId: linkedLead?.id || "",
          claimType: submissionData.claimType || "",
          client: {
            title: "",
            forename: submissionData.client?.firstName || "",
            surname: submissionData.client?.secondName || "",
            telephone: submissionData.client?.mobile || submissionData.client?.landline || "",
            email: submissionData.client?.email || "",
            postcode: linkedLead?.postcode || "",
            address: submissionData.client?.address || ""
          },
          submittedBy: submissionData.submittedBy || {},
          managerNotes: managerNotes.value,
          assessmentSummary: reportText,
          generatedAssessmentText: reportText,
          assessmentOutcome: assessmentOutcome.value || "",
          recommendedCloser: recommendedCloser.value.trim(),
          status: statusSelect.value,
          product1: submissionData.product1 || {},
          product2: submissionData.product2 || {},
          updatedAt: serverTimestamp(),
          updatedBy: {
            uid: currentUser.uid,
            email: currentUser.email || "",
            name: currentUserData.name || ""
          }
        };

        const existingAssessment = await findExistingAssessment();
        let assessmentId = "";

        if (existingAssessment) {
          assessmentId = existingAssessment.id;
          await updateDoc(doc(db, "managerAssessments", assessmentId), basePayload);
        } else {
          const assessmentRef = await addDoc(collection(db, "managerAssessments"), {
            ...basePayload,
            createdAt: serverTimestamp(),
            createdBy: {
              uid: currentUser.uid,
              email: currentUser.email || "",
              name: currentUserData.name || ""
            }
          });
          assessmentId = assessmentRef.id;
        }

        await updateDoc(doc(db, "claimSubmissions", submissionId), {
          status: "assessment_complete",
          managerNotes: managerNotes.value,
          assessmentSummary: reportText,
          generatedAssessmentText: reportText,
          assessmentOutcome: assessmentOutcome.value || "",
          recommendedCloser: recommendedCloser.value.trim(),
          assessmentId,
          assessmentCreatedAt: serverTimestamp(),
          assessmentCreatedBy: {
            uid: currentUser.uid,
            email: currentUser.email || "",
            name: currentUserData.name || ""
          }
        });

        if (linkedLead?.id) {
          await updateDoc(doc(db, "leadAssignments", linkedLead.id), {
            leadStatus: "qualified",
            assessmentId,
            assessmentOutcome: assessmentOutcome.value || "",
            recommendedCloser: recommendedCloser.value.trim(),
            assessmentSummary: reportText,
            generatedAssessmentText: reportText,
            managerNotes: managerNotes.value,
            lastAction: "assessment_report_created",
            lastUpdatedAt: serverTimestamp(),
            actionHistory: [{
              action: "assessment_report_created",
              byUid: currentUser.uid,
              byName: currentUserData.name || "",
              at: new Date().toISOString(),
              notes: "Assessment report created from intake detail."
            }]
          });
        }

        window.location.href = `/manager-assessment-detail.html?id=${assessmentId}`;
      } catch (error) {
        console.error("Failed to create assessment:", error);
        alert("Could not create assessment record.");
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      try {
        const hasAccess = await checkAccess(user);
        if (!hasAccess) return;
        await loadSubmission();
      } catch (error) {
        console.error(error);
        alert("Could not load submission.");
        window.location.href = "/manager-panel.html";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "/login.html";
      } catch (error) {
        console.error("Logout failed:", error);
        alert("Could not log out. Please try again.");
      }
    });
  </script>
</body>
</html>
