<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat with Quaerens</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .chat-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      padding: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      color: #1e40af;
      margin-bottom: 1rem;
    }

    .chat-message {
      margin-bottom: 1rem;
      padding: 1rem;
      background: #eef2ff;
      border-left: 4px solid #2563eb;
      border-radius: 6px;
    }

    .chat-response {
      background: #fff;
      border: 1px solid #e5e7eb;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .question-button {
      background: #2563eb;
      color: white;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      margin: 0.25rem;
      cursor: pointer;
      font-weight: 500;
    }

    .question-button:hover {
      background: #1e3a8a;
    }
  </style>

<style>
  /* Quaerens persistent language switcher */
  .quaerens-language-switcher {
    position: fixed;
    right: 1rem;
    top: 5.25rem;
    z-index: 70;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: rgba(255,255,255,0.96);
    border: 1px solid #dbeafe;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    padding: 0.45rem 0.55rem 0.45rem 0.8rem;
    font-family: Inter, Arial, sans-serif;
  }

  .quaerens-language-switcher label {
    font-size: 0.78rem;
    font-weight: 800;
    color: #1e3a8a;
  }

  .quaerens-language-switcher select {
    border: 0;
    background: transparent;
    color: #111827;
    font-weight: 700;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    max-width: 8.8rem;
  }

  .goog-te-banner-frame.skiptranslate,
  .goog-logo-link,
  .goog-te-gadget,
  body > .skiptranslate {
    display: none !important;
  }

  body {
    top: 0 !important;
  }

  @media (max-width: 768px) {
    .quaerens-language-switcher {
      top: 4.35rem;
      right: 0.75rem;
      padding: 0.38rem 0.5rem 0.38rem 0.65rem;
    }

    .quaerens-language-switcher label {
      display: none;
    }

    .quaerens-language-switcher select {
      max-width: 7.6rem;
      font-size: 0.78rem;
    }
  }
</style>
<script>
  // Quaerens persistent language switcher
  function quaerensSetLanguage(lang) {
    var value = lang === 'en' ? '' : '/en/' + lang;
    var expires = '; expires=' + new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toUTCString();
    var hostname = window.location.hostname;
    document.cookie = 'googtrans=' + value + expires + '; path=/';
    if (hostname) {
      document.cookie = 'googtrans=' + value + expires + '; domain=' + hostname + '; path=/';
      var parts = hostname.split('.');
      if (parts.length > 2) {
        document.cookie = 'googtrans=' + value + expires + '; domain=.' + parts.slice(-2).join('.') + '; path=/';
      }
    }
    localStorage.setItem('quaerensLanguage', lang);
    window.location.reload();
  }

  function quaerensReadTranslateCookie() {
    var match = document.cookie.match(/(?:^|; )googtrans=([^;]*)/);
    if (!match) return '';
    var decoded = decodeURIComponent(match[1]);
    var parts = decoded.split('/');
    return parts.length >= 3 ? parts[2] : '';
  }

  function quaerensInitLanguageSelect() {
    var select = document.getElementById('quaerensLanguageSelect');
    if (!select) return;
    var lang = quaerensReadTranslateCookie() || localStorage.getItem('quaerensLanguage') || 'en';
    select.value = lang;
  }

  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,nl,es,fr,de,it,sv,el',
      autoDisplay: false
    }, 'google_translate_element');
    quaerensInitLanguageSelect();
  }

  document.addEventListener('DOMContentLoaded', quaerensInitLanguageSelect);
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>


<!-- Microsoft Clarity tracking -->
<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window, document, "clarity", "script", "win9cr05wh");
</script>

</head>
<body>

<!-- Quaerens persistent language switcher -->
<div id="google_translate_element" style="display:none;"></div>
<div class="quaerens-language-switcher" aria-label="Language selector">
  <label for="quaerensLanguageSelect">Language</label>
  <select id="quaerensLanguageSelect" onchange="quaerensSetLanguage(this.value)">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="it">Italiano</option>
    <option value="sv">Svenska</option>
    <option value="el">Ελληνικά</option>
  </select>
</div>

  <div class="chat-container">
    <h1>Chat with Quaerens 🤖</h1>
    <div class="chat-message">
      Hello! How can we help you today?
    </div>

    <div class="chat-response" id="chatResponse">
      Please select a question below.
    </div>

    <div>
      <button class="question-button" onclick="showAnswer('mortgage')">Do I qualify for a Spanish mortgage refund?</button>
      <button class="question-button" onclick="showAnswer('offplan')">What if my off-plan property was never delivered?</button>
      <button class="question-button" onclick="showAnswer('fee')">Do I need to pay upfront?</button>
    </div>
  </div>

  <script>
    function showAnswer(type) {
      const responseBox = document.getElementById('chatResponse');
      let text = '';
      switch (type) {
        case 'mortgage':
          text = "If you signed a mortgage in Spain before 2019 and weren't fully informed of the risks or terms, you may qualify for a legal refund — even if the loan is paid off.";
          break;
        case 'offplan':
          text = "If you paid for a property that was never completed or delivered, and the developer didn’t provide a bank guarantee, you could claim against the bank directly.";
          break;
        case 'fee':
          text = "No — we work on a No Win, No Fee basis. You only pay if we successfully recover funds for you.";
          break;
      }
      responseBox.innerHTML = text;
    }
  </script>
</body>
</html>
