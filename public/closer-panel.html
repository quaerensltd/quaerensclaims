<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaerens Closer Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { background: white; border: 1px solid #dbeafe; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .input { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 0.75rem 0.9rem; }
    .btn { border-radius: 12px; padding: 0.75rem 1rem; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #eff6ff; color: #1d4ed8; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="authLoader" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-600 font-medium">Loading closer panel...</p>
    </div>
  </div>

  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-extrabold text-blue-900">Quaerens Closer Panel</h1>
          <p class="text-sm text-slate-500">Assigned clients, appointments, and assessments</p>
        </div>

        <div class="flex items-center gap-3">
          <div class="text-sm text-slate-500 text-right">
            <div id="closerStatus">Checking access...</div>
            <div id="closerEmail" class="text-xs text-slate-400"></div>
          </div>
          <button id="logoutBtn" class="btn btn-secondary py-2 px-4 hidden" type="button">
            Log Out
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
      <section class="card p-6">
        <div class="grid md:grid-cols-4 gap-4">
          <div>
            <label class="block text-sm font-semibold text-blue-900 mb-2">Claim type</label>
            <select id="claimTypeFilter" class="input">
              <option value="all">All claim types</option>
              <option value="solar">Solar Panel Claims</option>
              <option value="mortgage">Mortgage Review</option>
              <option value="survey">Survey Review</option>
              <option value="newbuild">New Build Issues</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-semibold text-blue-900 mb-2">Status</label>
            <select id="statusFilter" class="input">
              <option value="all">All statuses</option>
              <option value="Assigned">Assigned</option>
              <option value="Contacted">Contacted</option>
              <option value="Appointment Booked">Appointment Booked</option>
              <option value="Closed">Closed</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-blue-900 mb-2">Search</label>
            <input id="searchInput" type="text" class="input" placeholder="Search by client, email, phone..." />
          </div>
        </div>
      </section>

      <section class="card p-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-xl font-extrabold text-blue-900">My Assigned Clients</h2>
            <p id="resultsSummary" class="text-sm text-slate-500 mt-1">Loading assignments...</p>
          </div>
          <button id="refreshBtn" class="btn btn-secondary" type="button">Refresh</button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="bg-blue-50 text-blue-900">
                <th class="text-left p-3">Appointment</th>
                <th class="text-left p-3">Claim Type</th>
                <th class="text-left p-3">Client</th>
                <th class="text-left p-3">Email</th>
                <th class="text-left p-3">Phone</th>
                <th class="text-left p-3">Status</th>
                <th class="text-left p-3">Action</th>
              </tr>
            </thead>
            <tbody id="assignmentsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authLoader = document.getElementById("authLoader");
    const closerStatus = document.getElementById("closerStatus");
    const closerEmail = document.getElementById("closerEmail");
    const logoutBtn = document.getElementById("logoutBtn");

    const claimTypeFilter = document.getElementById("claimTypeFilter");
    const statusFilter = document.getElementById("statusFilter");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const assignmentsBody = document.getElementById("assignmentsBody");
    const resultsSummary = document.getElementById("resultsSummary");

    let currentUser = null;
    let currentUserData = null;
    let allAssignments = [];

    function hideLoader() {
      if (authLoader) authLoader.style.display = "none";
    }

    function formatClaimType(type) {
      switch (type) {
        case "solar": return "Solar Panel Claims";
        case "mortgage": return "Mortgage Review";
        case "survey": return "Survey Review";
        case "newbuild": return "New Build Issues";
        default: return type || "-";
      }
    }

    function formatAppointment(appointment) {
      if (!appointment) return "-";
      const date = appointment.date || "-";
      const time = appointment.time || "-";
      return `${date} ${time}`.trim();
    }

    function badgeClass(status) {
      if (status === "Closed") return "bg-green-100 text-green-800";
      if (status === "Appointment Booked") return "bg-blue-100 text-blue-800";
      if (status === "Contacted") return "bg-indigo-100 text-indigo-800";
      return "bg-amber-100 text-amber-800";
    }

    async function checkCloserAccess(user) {
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        alert("No user profile found for this account.");
        window.location.href = "/login.html";
        return false;
      }

      const userData = userSnap.data();
      if (userData.role !== "closer") {
        alert("You do not have permission to access the closer panel.");
        window.location.href = "/login.html";
        return false;
      }

      currentUser = user;
      currentUserData = userData;

      closerStatus.textContent = "Logged in as Closer";
      closerEmail.textContent = user.email || "";
      logoutBtn.classList.remove("hidden");
      return true;
    }

    async function loadAssignments() {
      try {
        const q = query(
          collection(db, "closerAssignments"),
          where("closer.uid", "==", currentUser.uid)
        );

        const snapshot = await getDocs(q);
        allAssignments = snapshot.docs.map(docSnap => ({
          id: docSnap.id,
          ...docSnap.data()
        }));

        renderAssignments();
      } catch (error) {
        console.error("Failed to load assignments:", error);
        resultsSummary.textContent = "Could not load assignments.";
      }
    }

    function renderAssignments() {
      const selectedType = claimTypeFilter.value;
      const selectedStatus = statusFilter.value;
      const searchTerm = searchInput.value.trim().toLowerCase();

      const filtered = allAssignments.filter(item => {
        const matchesType = selectedType === "all" || item.claimType === selectedType;
        const matchesStatus = selectedStatus === "all" || item.status === selectedStatus;

        const clientName = `${item.client?.firstName || ""} ${item.client?.secondName || ""}`.trim().toLowerCase();
        const clientEmail = (item.client?.email || "").toLowerCase();
        const clientPhone = ((item.client?.mobile || "") + " " + (item.client?.landline || "")).toLowerCase();

        const matchesSearch =
          !searchTerm ||
          clientName.includes(searchTerm) ||
          clientEmail.includes(searchTerm) ||
          clientPhone.includes(searchTerm);

        return matchesType && matchesStatus && matchesSearch;
      });

      assignmentsBody.innerHTML = "";

      if (!filtered.length) {
        assignmentsBody.innerHTML = `
          <tr>
            <td colspan="7" class="p-6 text-center text-slate-500">No assigned clients found.</td>
          </tr>
        `;
      } else {
        filtered.forEach(item => {
          const row = document.createElement("tr");
          row.className = "border-t border-slate-200";

          const clientName = `${item.client?.firstName || ""} ${item.client?.secondName || ""}`.trim() || "-";

          row.innerHTML = `
            <td class="p-3">${formatAppointment(item.appointment)}</td>
            <td class="p-3">${formatClaimType(item.claimType)}</td>
            <td class="p-3">${clientName}</td>
            <td class="p-3">${item.client?.email || "-"}</td>
            <td class="p-3">${item.client?.mobile || item.client?.landline || "-"}</td>
            <td class="p-3">
              <span class="px-2 py-1 rounded-full text-xs font-semibold ${badgeClass(item.status)}">
                ${item.status || "Assigned"}
              </span>
            </td>
            <td class="p-3">
              <a href="/closer-detail.html?id=${item.id}" class="text-blue-600 font-semibold hover:underline">Open File</a>
            </td>
          `;
          assignmentsBody.appendChild(row);
        });
      }

      resultsSummary.textContent = `${filtered.length} assigned client(s) shown`;
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      try {
        const allowed = await checkCloserAccess(user);
        if (!allowed) return;
        hideLoader();
        await loadAssignments();
      } catch (error) {
        console.error(error);
        alert("Could not load closer panel.");
        window.location.href = "/login.html";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "/login.html";
      } catch (error) {
        console.error("Logout failed:", error);
        alert("Could not log out.");
      }
    });

    claimTypeFilter.addEventListener("change", renderAssignments);
    statusFilter.addEventListener("change", renderAssignments);
    searchInput.addEventListener("input", renderAssignments);
    refreshBtn.addEventListener("click", loadAssignments);
  </script>
</body>
</html>
