<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaerens Manager Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { background: white; border: 1px solid #dbeafe; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .input { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 0.75rem 0.9rem; }
    .btn { border-radius: 12px; padding: 0.75rem 1rem; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #eff6ff; color: #1d4ed8; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="authLoader" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-600 font-medium">Checking manager access...</p>
    </div>
  </div>

  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4 flex-wrap">
        <div>
          <h1 class="text-2xl font-extrabold text-blue-900">Quaerens Manager Panel</h1>
          <p class="text-sm text-slate-500">Secure review area for internal claim submissions</p>
        </div>

        <div class="flex items-center gap-3 flex-wrap">
          <a href="/manager-panel.html" class="btn btn-secondary py-2 px-4">Manager Panel</a>
          <a href="/manager-lead-upload.html" class="btn btn-secondary py-2 px-4">Lead Upload</a>
          <a href="/manager-leads-overview.html" class="btn btn-secondary py-2 px-4">Leads Overview</a>
          <a href="/manager-intro-emails-overview.html" class="btn btn-secondary py-2 px-4">Intro Emails</a>

          <div class="text-sm text-slate-500 text-right">
            <div id="staffStatus">Checking access...</div>
            <div id="staffEmail" class="text-xs text-slate-400"></div>
          </div>

          <button id="logoutBtn" class="btn btn-secondary py-2 px-4 hidden" type="button">
            Log Out
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
      <section class="card p-6">
        <div class="grid md:grid-cols-4 gap-4">
          <div>
            <label class="block text-sm font-semibold text-blue-900 mb-2">Claim type</label>
            <select id="claimTypeFilter" class="input">
              <option value="all">All claim types</option>
              <option value="solar">Solar Panel Claims</option>
              <option value="mortgage">Mortgage Review</option>
              <option value="survey">Survey Review</option>
              <option value="newbuild">New Build Issues</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-semibold text-blue-900 mb-2">Status</label>
            <select id="statusFilter" class="input">
              <option value="all">All statuses</option>
              <option value="draft">Draft</option>
              <option value="submitted">Awaiting Review</option>
              <option value="in_review">In Review</option>
              <option value="assessment_complete">Assessment Complete</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-blue-900 mb-2">Search</label>
            <input id="searchInput" type="text" class="input" placeholder="Search client, email, staff member..." />
          </div>
        </div>
      </section>

      <section class="card p-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-xl font-extrabold text-blue-900">Submitted Intakes</h2>
            <p id="resultsSummary" class="text-sm text-slate-500 mt-1">Loading submissions...</p>
          </div>
          <button id="refreshBtn" class="btn btn-secondary" type="button">Refresh</button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="bg-blue-50 text-blue-900">
                <th class="text-left p-3">Received</th>
                <th class="text-left p-3">Claim Type</th>
                <th class="text-left p-3">Client</th>
                <th class="text-left p-3">Client Email</th>
                <th class="text-left p-3">Submitted By</th>
                <th class="text-left p-3">Status</th>
                <th class="text-left p-3">Action</th>
              </tr>
            </thead>
            <tbody id="submissionsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authLoader = document.getElementById("authLoader");
    const staffStatus = document.getElementById("staffStatus");
    const staffEmail = document.getElementById("staffEmail");
    const logoutBtn = document.getElementById("logoutBtn");
    const claimTypeFilter = document.getElementById("claimTypeFilter");
    const statusFilter = document.getElementById("statusFilter");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const submissionsBody = document.getElementById("submissionsBody");
    const resultsSummary = document.getElementById("resultsSummary");

    let allSubmissions = [];

    function hideLoader() {
      if (authLoader) authLoader.style.display = "none";
    }

    function formatDate(timestamp) {
      if (!timestamp?.toDate) return "-";
      return timestamp.toDate().toLocaleString();
    }

    function formatClaimType(type) {
      switch (type) {
        case "solar": return "Solar Panel Claims";
        case "mortgage": return "Mortgage Review";
        case "survey": return "Survey Review";
        case "newbuild": return "New Build Issues";
        default: return type || "-";
      }
    }

    function normalizeStatus(status) {
      if (status === "draft") return "Draft";
      if (status === "submitted") return "Awaiting Review";
      if (status === "in_review") return "In Review";
      if (status === "assessment_complete") return "Assessment Complete";
      return status || "Awaiting Review";
    }

    function badgeClass(status) {
      if (status === "assessment_complete") return "bg-green-100 text-green-800";
      if (status === "in_review") return "bg-blue-100 text-blue-800";
      if (status === "draft") return "bg-slate-100 text-slate-700";
      return "bg-amber-100 text-amber-800";
    }

    async function checkManagerAccess(user) {
      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          alert("No staff profile found for this account.");
          window.location.href = "/login.html";
          return;
        }

        const userData = userSnap.data();

        if (userData.role !== "manager") {
          alert("You do not have permission to access the manager panel.");
          window.location.href = "/client-intake-portal.html";
          return;
        }

        staffStatus.textContent = "Logged in as Manager";
        staffEmail.textContent = user.email || "";
        logoutBtn.classList.remove("hidden");
        hideLoader();
        await loadSubmissions();
      } catch (error) {
        console.error("Manager access check failed:", error);
        alert("There was a problem checking access.");
        window.location.href = "/login.html";
      }
    }

    async function loadSubmissions() {
      try {
        const snapshot = await getDocs(collection(db, "claimSubmissions"));

        allSubmissions = snapshot.docs.map(docSnap => ({
          id: docSnap.id,
          ...docSnap.data()
        }));

        allSubmissions.sort((a, b) => {
          const aTime = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const bTime = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
          return bTime - aTime;
        });

        renderSubmissions();
      } catch (error) {
        console.error("Failed to load submissions:", error);
        resultsSummary.textContent = "Could not load submissions.";
        submissionsBody.innerHTML = `
          <tr>
            <td colspan="7" class="p-6 text-center text-red-600">Error loading submissions.</td>
          </tr>
        `;
      }
    }

    function renderSubmissions() {
      const selectedType = claimTypeFilter.value;
      const selectedStatus = statusFilter.value;
      const searchTerm = searchInput.value.trim().toLowerCase();

      const filtered = allSubmissions.filter(item => {
        const matchesType = selectedType === "all" || item.claimType === selectedType;
        const matchesStatus = selectedStatus === "all" || (item.status || "submitted") === selectedStatus;

        const clientName = `${item.client?.firstName || ""} ${item.client?.secondName || ""}`.trim().toLowerCase();
        const clientEmail = (item.client?.email || "").toLowerCase();
        const staffName = (item.submittedBy?.name || "").toLowerCase();
        const staffEmailValue = (item.submittedBy?.email || "").toLowerCase();

        const matchesSearch =
          !searchTerm ||
          clientName.includes(searchTerm) ||
          clientEmail.includes(searchTerm) ||
          staffName.includes(searchTerm) ||
          staffEmailValue.includes(searchTerm);

        return matchesType && matchesStatus && matchesSearch;
      });

      submissionsBody.innerHTML = "";

      if (!filtered.length) {
        submissionsBody.innerHTML = `
          <tr>
            <td colspan="7" class="p-6 text-center text-slate-500">No submissions found.</td>
          </tr>
        `;
      } else {
        filtered.forEach(item => {
          const row = document.createElement("tr");
          row.className = "border-t border-slate-200";

          const clientName = `${item.client?.firstName || ""} ${item.client?.secondName || ""}`.trim() || "-";
          const clientEmail = item.client?.email || "-";
          const submittedBy = item.submittedBy?.name || item.submittedBy?.email || "-";
          const rawStatus = item.status || "submitted";

          row.innerHTML = `
            <td class="p-3">${formatDate(item.createdAt)}</td>
            <td class="p-3">${formatClaimType(item.claimType)}</td>
            <td class="p-3">${clientName}</td>
            <td class="p-3">${clientEmail}</td>
            <td class="p-3">${submittedBy}</td>
            <td class="p-3">
              <span class="px-2 py-1 rounded-full text-xs font-semibold ${badgeClass(rawStatus)}">
                ${normalizeStatus(rawStatus)}
              </span>
            </td>
            <td class="p-3">
              <a href="/intake-detail.html?id=${item.id}" class="text-blue-600 font-semibold hover:underline">Open File</a>
            </td>
          `;

          submissionsBody.appendChild(row);
        });
      }

      resultsSummary.textContent = `${filtered.length} submission(s) shown`;
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }
      await checkManagerAccess(user);
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "/login.html";
      } catch (error) {
        console.error("Logout failed:", error);
        alert("Could not log out. Please try again.");
      }
    });

    claimTypeFilter.addEventListener("change", renderSubmissions);
    statusFilter.addEventListener("change", renderSubmissions);
    searchInput.addEventListener("input", renderSubmissions);
    refreshBtn.addEventListener("click", loadSubmissions);
  </script>
</body>
</html>
