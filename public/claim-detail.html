<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claim Details | Quaerens Ltd</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 2rem;
      color: #111827;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img {
      height: 50px;
    }
    h1 {
      font-size: 1.75rem;
      margin: 1.5rem 0 0.5rem;
    }
    .content {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .field {
      margin-bottom: 1rem;
    }
    .field strong {
      display: inline-block;
      width: 140px;
    }
    select {
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      font-weight: 600;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #1d4ed8;
    }
    .message {
      margin-top: 1rem;
      color: green;
      font-weight: 500;
    }
  </style>

<style>
  /* Quaerens persistent language switcher */
  .quaerens-language-switcher {
    position: fixed;
    right: 1rem;
    top: 5.25rem;
    z-index: 70;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: rgba(255,255,255,0.96);
    border: 1px solid #dbeafe;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    padding: 0.45rem 0.55rem 0.45rem 0.8rem;
    font-family: Inter, Arial, sans-serif;
  }

  .quaerens-language-switcher label {
    font-size: 0.78rem;
    font-weight: 800;
    color: #1e3a8a;
  }

  .quaerens-language-switcher select {
    border: 0;
    background: transparent;
    color: #111827;
    font-weight: 700;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    max-width: 8.8rem;
  }

  .goog-te-banner-frame.skiptranslate,
  .goog-logo-link,
  .goog-te-gadget,
  body > .skiptranslate {
    display: none !important;
  }

  body {
    top: 0 !important;
  }

  @media (max-width: 768px) {
    .quaerens-language-switcher {
      top: 4.35rem;
      right: 0.75rem;
      padding: 0.38rem 0.5rem 0.38rem 0.65rem;
    }

    .quaerens-language-switcher label {
      display: none;
    }

    .quaerens-language-switcher select {
      max-width: 7.6rem;
      font-size: 0.78rem;
    }
  }
</style>
<script>
  // Quaerens persistent language switcher
  function quaerensSetLanguage(lang) {
    var value = lang === 'en' ? '' : '/en/' + lang;
    var expires = '; expires=' + new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toUTCString();
    var hostname = window.location.hostname;
    document.cookie = 'googtrans=' + value + expires + '; path=/';
    if (hostname) {
      document.cookie = 'googtrans=' + value + expires + '; domain=' + hostname + '; path=/';
      var parts = hostname.split('.');
      if (parts.length > 2) {
        document.cookie = 'googtrans=' + value + expires + '; domain=.' + parts.slice(-2).join('.') + '; path=/';
      }
    }
    localStorage.setItem('quaerensLanguage', lang);
    window.location.reload();
  }

  function quaerensReadTranslateCookie() {
    var match = document.cookie.match(/(?:^|; )googtrans=([^;]*)/);
    if (!match) return '';
    var decoded = decodeURIComponent(match[1]);
    var parts = decoded.split('/');
    return parts.length >= 3 ? parts[2] : '';
  }

  function quaerensInitLanguageSelect() {
    var select = document.getElementById('quaerensLanguageSelect');
    if (!select) return;
    var lang = quaerensReadTranslateCookie() || localStorage.getItem('quaerensLanguage') || 'en';
    select.value = lang;
  }

  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,nl,es,fr,de,it,sv,el',
      autoDisplay: false
    }, 'google_translate_element');
    quaerensInitLanguageSelect();
  }

  document.addEventListener('DOMContentLoaded', quaerensInitLanguageSelect);
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>
<body>

<!-- Quaerens persistent language switcher -->
<div id="google_translate_element" style="display:none;"></div>
<div class="quaerens-language-switcher" aria-label="Language selector">
  <label for="quaerensLanguageSelect">Language</label>
  <select id="quaerensLanguageSelect" onchange="quaerensSetLanguage(this.value)">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="it">Italiano</option>
    <option value="sv">Svenska</option>
    <option value="el">Ελληνικά</option>
  </select>
</div>

  <header>
    <h1>Claim Details</h1>
    <img src="/quaerens-logo.png" alt="Quaerens Logo" />
  </header>

  <div class="content">
    <div id="claimDetails">Loading claim details...</div>

    <div id="statusControls" style="display:none">
      <label for="status"><strong>Update Status:</strong></label>
      <select id="status">
        <option value="pending">Pending</option>
        <option value="in-review">In Review</option>
        <option value="resolved">Resolved</option>
        <option value="rejected">Rejected</option>
      </select>
      <br />
      <button onclick="updateStatus()">Save Status</button>
      <div class="message" id="statusMessage"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims",
      storageBucket: "quaerensclaims.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const claimId = params.get("id");
    const claimDetails = document.getElementById("claimDetails");
    const statusSelect = document.getElementById("status");
    const statusControls = document.getElementById("statusControls");
    const statusMessage = document.getElementById("statusMessage");

    if (!claimId) {
      claimDetails.textContent = "❌ Claim not found or invalid ID.";
    } else {
      loadClaim();
    }

    async function loadClaim() {
      const ref = doc(db, "claims", claimId);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        claimDetails.textContent = "❌ Claim not found.";
        return;
      }

      const data = snap.data();
      claimDetails.innerHTML = data.html || "⚠️ No claim details available.";
      statusSelect.value = data.status || "pending";
      statusControls.style.display = "block";
    }

    async function updateStatus() {
      const newStatus = statusSelect.value;
      const ref = doc(db, "claims", claimId);
      await updateDoc(ref, { status: newStatus });
      statusMessage.textContent = "✅ Status updated!";
      setTimeout(() => statusMessage.textContent = "", 3000);
    }
  </script>
</body>
</html>
