<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Quaerens Admin V2 | Free Claim Tools</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />

  <style>
    body { font-family: 'Inter', sans-serif; }
    .hidden { display: none !important; }

    input, select, textarea {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0.65rem;
      width: 100%;
    }

    .stat-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .claim-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .label {
      font-size: 0.72rem;
      color: #6b7280;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      color: #111827;
      font-weight: 650;
      word-break: break-word;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.25rem 0.65rem;

      font-weight: 800;

    .badge-won { background: #dcfce7; color: #166534; }
    .badge-lost { background: #fee2e2; color: #991b1b; }
    .badge-waiting { background: #fef3c7; color: #92400e; }
    .badge-neutral { background: #f3f4f6; color: #374151; }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      z-index: 50;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      height: 100%;
      width: min(680px, 100%);
      background: white;
      z-index: 60;
      overflow-y: auto;
      box-shadow: -20px 0 60px rgba(15, 23, 42, 0.25);
    }
  </style>

</head>

<body class="bg-gray-50 text-gray-800">

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  limit,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
  authDomain: "quaerensclaims.firebaseapp.com",
  projectId: "quaerensclaims",
  storageBucket: "quaerensclaims.appspot.com",
  messagingSenderId: "207213580015",
  appId: "1:207213580015:web:placeholder"
};

const allowedAdmins = ["info@quaerens.co.uk"];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginView = document.getElementById("loginView");
const dashboardView = document.getElementById("dashboardView");
const logoutBtn = document.getElementById("logoutBtn");
const loginForm = document.getElementById("loginForm");
const loginError = document.getElementById("loginError");

const claimsSection = document.getElementById("claimsSection");
const leadsSection = document.getElementById("leadsSection");
const eventsSection = document.getElementById("eventsSection");

const claimsCards = document.getElementById("claimsCards");
const leadsCards = document.getElementById("leadsCards");
const eventsCards = document.getElementById("eventsCards");

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");
const viewSelect = document.getElementById("viewSelect");
const productFilter = document.getElementById("productFilter");
const refreshBtn = document.getElementById("refreshBtn");
const exportCsvBtn = document.getElementById("exportCsvBtn");

const drawerBackdrop = document.getElementById("drawerBackdrop");
const claimDrawer = document.getElementById("claimDrawer");
const closeDrawerBtn = document.getElementById("closeDrawerBtn");
const drawerContent = document.getElementById("drawerContent");
const drawerSubtitle = document.getElementById("drawerSubtitle");

let claimsData = [];
let leadsData = [];
let conversionData = [];

const statuses = [
  "new",
  "letter_generated",
  "sent_to_airline",
  "awaiting_airline",
  "rejected",
  "escalation_offered",
  "won",
  "lost"
];

const EMPTY_VALUE = "Not provided";
const CURRENCY_SYMBOLS = {
  GBP: "\u00A3",
  EUR: "\u20AC"
};

function safe(value) {
  return value === undefined || value === null || value === "" ? EMPTY_VALUE : value;
}

function formatDate(value) {
  if (!value) return EMPTY_VALUE;
  if (value.toDate) return value.toDate().toLocaleString();
  if (typeof value === "string") return new Date(value).toLocaleString();
  return EMPTY_VALUE;
}

function route(row) {
  if (row.depAirport || row.arrAirport) return `${safe(row.depAirport)} -> ${safe(row.arrAirport)}`;
  return safe(row.issueTypeLabel || row.toolName || row.product || "");
}

function respondent(row) {
  return row.airline || row.company || row.provider || "";
}

function referenceValue(row) {
  return row.flightNumber || row.referenceNumber || row.bookingRef || row.generatedReference || "";
}

function statusBadgeClass(status) {
  if (status === "new") return "badge-new";
  if (status === "won") return "badge-won";
  if (status === "lost" || status === "rejected") return "badge-lost";
  if (status === "awaiting_airline" || status === "sent_to_airline") return "badge-waiting";
  return "badge-neutral";
}

function statusOptions(currentStatus) {
  return statuses.map(status => {
    return `<option value="${status}" ${status === currentStatus ? "selected" : ""}>${status.replaceAll("_", " ")}</option>`;
  }).join("");
}

function getCurrentProduct() {
  return productFilter.value || "all";
}
function matchesProduct(row) {
  const product = getCurrentProduct();
  if (product === "all") return true;

  const rowProduct = row.product || "";
  const rowSource = row.source || "";

  return rowProduct === product || rowSource.includes(product);
}

function matchesSearch(row) {
  const term = searchInput.value.trim().toLowerCase();
  if (!term) return true;

  return [
    row.fullName,
    row.email,
    row.phone,
    row.airline,
    row.flightNumber,
    row.depAirport,
    row.arrAirport,
    row.product,
    row.source
  ]
    .filter(Boolean)
    .some(value => String(value).toLowerCase().includes(term));
}

function matchesStatus(row) {
  const status = statusFilter.value;
  if (status === "all") return true;
  return (row.status || "new") === status;
}

function filteredClaims() {
  return claimsData.filter(matchesSearch).filter(matchesStatus).filter(matchesProduct);
}

function filteredLeads() {
  return leadsData.filter(matchesSearch).filter(matchesProduct);
}

function filteredEvents() {
  return conversionData.filter(matchesSearch).filter(matchesProduct);
}

function moneyValue(value) {
  if (value === undefined || value === null || value === "") return 0;
  const cleaned = String(value).replace(/[^0-9.-]/g, "");
  const number = Number(cleaned);
  return Number.isFinite(number) ? number : 0;
}

function claimCurrency(row) {
  const currency = String(row.amountCurrency || row.currency || "").toUpperCase();
  if (currency === "GBP" || currency === "EUR") return currency;
  return (row.product || row.source || "") === "freeflightclaim" ? "EUR" : "GBP";
}

function formatMoney(value, currency = "GBP") {
  if (value === undefined || value === null || value === "") return EMPTY_VALUE;
  const number = moneyValue(value);
  const symbol = CURRENCY_SYMBOLS[currency] || "";
  return `${symbol}${number.toLocaleString("en-GB", {
    minimumFractionDigits: number % 1 ? 2 : 0,
    maximumFractionDigits: 2
  })}`;
}

function formatClaimMoney(row) {
  return formatMoney(row.compensation, claimCurrency(row));
}

function formatClaimTotal(claims) {
  const totals = claims.reduce((acc, claim) => {
    const currency = claimCurrency(claim);
    acc[currency] = (acc[currency] || 0) + moneyValue(claim.compensation);
    return acc;
  }, {});

  const entries = Object.entries(totals).filter(([, total]) => total !== 0);
  if (!entries.length) return "\u00A30";

  return entries
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([currency, total]) => formatMoney(total, currency))
    .join(" / ");
}

function updateDashboardStats() {
  const claims = filteredClaims();
  const marketingClaims = claims.filter(claim => claim.marketingConsent === true);

  document.getElementById("claimsCount").textContent = claims.length;
  document.getElementById("leadsCount").textContent = marketingClaims.length;
  document.getElementById("newClaimsCount").textContent =
    claims.filter(c => (c.status || "new") === "new").length;
  document.getElementById("claimValueTotal").textContent = formatClaimTotal(claims);
}

function renderConversions() {
  const claims = filteredClaims();
  const emailRequested = claims.filter(claim => claim.handleOption === "email").length;
  const pdfGenerated = claims.length;
  const marketingOptIns = claims.filter(claim => claim.marketingConsent === true).length;

  document.getElementById("submittedCount").textContent = claims.length;
  document.getElementById("emailRequestedCount").textContent = emailRequested;
  document.getElementById("pdfGeneratedCount").textContent = pdfGenerated;
  document.getElementById("marketingOptInCount").textContent = marketingOptIns;
  document.getElementById("followUpQueuedCount").textContent = claims.length;

  updateDashboardStats();
}

function renderClaims() {
  const rows = filteredClaims();
  claimsCards.innerHTML = "";

  if (!rows.length) {
    claimsCards.innerHTML = `<p class="text-center text-gray-500 py-8">No claims found.</p>`;
    return;
  }

  rows.forEach(row => {
    const status = row.status || "new";

    claimsCards.insertAdjacentHTML("beforeend", `
      <article class="claim-card">
        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-start gap-4">
          <div>
            <div class="flex flex-wrap items-center gap-2 mb-2">
              <h3 class="text-xl font-extrabold text-blue-900">${safe(row.fullName)}</h3>
              <span class="badge ${statusBadgeClass(status)}">${status.replaceAll("_", " ")}</span>
              <span class="badge badge-neutral">${safe(row.product || "freeflightclaim")}</span>
            </div>

            <p class="text-sm text-gray-600">
              ${formatDate(row.createdAt || row.submittedAt)}
            </p>
          </div>

          <div class="flex flex-wrap gap-2">
            <button class="openClaimBtn bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold px-4 py-2 rounded-xl" data-id="${row.id}">
              Open Details
            </button>
            <button class="deleteClaimBtn bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded-xl" data-id="${row.id}">
              Delete
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
          <div>
            <p class="label">Email</p>
            <p class="value"><a href="mailto:${safe(row.email)}" class="text-blue-600 underline">${safe(row.email)}</a></p>
          </div>

          <div>
            <p class="label">Phone</p>
            <p class="value">${safe(row.phone)}</p>
          </div>

          <div>
            <p class="label">Airline / Flight</p>
            <p class="value">${safe(row.airline)} / ${safe(row.flightNumber)}</p>
          </div>

          <div>
            <p class="label">Route</p>
            <p class="value">${route(row)}</p>
          </div>

          <div>
            <p class="label">Compensation</p>
            <p class="value">${formatClaimMoney(row)}</p>
          </div>

          <div>
            <p class="label">Marketing</p>
            <p class="value">${row.marketingConsent ? "Yes" : "No"}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-5">
          <div>
            <label class="label">Status</label>
            <select class="statusSelect mt-1" data-id="${row.id}">
              ${statusOptions(status)}
            </select>
          </div>

          <div class="lg:col-span-2">
            <label class="label">Internal Notes</label>
            <textarea class="notesInput mt-1 min-h-[90px]" data-id="${row.id}" placeholder="Add notes here...">${row.notes || ""}</textarea>
          </div>
        </div>

        <div class="mt-4">
          <button class="saveClaimBtn bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-3 rounded-xl" data-id="${row.id}">
            Save Status / Notes
          </button>
        </div>
      </article>
    `);
  });

  document.querySelectorAll(".saveClaimBtn").forEach(button => {
    button.addEventListener("click", async () => {
      const id = button.dataset.id;
      const status = document.querySelector(`.statusSelect[data-id="${id}"]`).value;
      const notes = document.querySelector(`.notesInput[data-id="${id}"]`).value;

      button.textContent = "Saving...";
      button.disabled = true;

      try {
        await updateDoc(doc(db, "flightClaimLetters", id), {
          status,
          notes,
          updatedAt: serverTimestamp()
        });

        button.textContent = "Saved";
        setTimeout(() => {
          button.textContent = "Save Status / Notes";
          button.disabled = false;
        }, 1000);

        await loadData();
      } catch (err) {
        console.error(err);
        alert("Could not save status/notes.");
        button.textContent = "Save Status / Notes";
        button.disabled = false;
      }
    });
  });

  document.querySelectorAll(".deleteClaimBtn").forEach(button => {
    button.addEventListener("click", async () => {
      const id = button.dataset.id;
      const row = claimsData.find(claim => claim.id === id);
      const label = row ? `${row.fullName || "this claim"} / ${referenceValue(row) || "no reference"}` : "this claim";

      if (!confirm(`Delete ${label}? This cannot be undone.`)) return;

      button.textContent = "Deleting...";
      button.disabled = true;

      try {
        await deleteDoc(doc(db, "flightClaimLetters", id));

        claimsData = claimsData.filter(claim => claim.id !== id);
        renderClaims();
        renderConversions();
        renderLeads();
        renderEvents();

        await loadData();
      } catch (err) {
        console.error(err);
        alert("Could not delete claim.");
        button.textContent = "Delete";
        button.disabled = false;
      }
    });
  });

  document.querySelectorAll(".openClaimBtn").forEach(button => {
    button.addEventListener("click", () => {
      const row = claimsData.find(claim => claim.id === button.dataset.id);
      if (row) openDrawer(row);
    });
  });
}

  rows.forEach(row => {

            <h3 class="text-lg font-extrabold text-blue-900">${safe(row.eventName)}</h3>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-5">

            <p class="label">Name</p>
            <p class="value">${safe(row.fullName)}</p>
          </div>

          <div>
            <p class="label">Email</p>
            <p class="value">${safe(row.email)}</p>
          </div>

          <div>
            <p class="label">Phone</p>
            <p class="value">${safe(row.phone)}</p>
          </div>

          <div>
            <p class="label">Flight</p>
            <p class="value">${safe(row.flightNumber)}</p>
          </div>

          <div>
            <p class="label">Airline</p>
            <p class="value">${safe(row.airline)}</p>
          </div>

          <div>
            <p class="label">Route</p>

function detailField(label, value) {
  return `
    <div class="border rounded-xl p-3">
      <p class="label">${label}</p>
      <p class="value">${safe(value)}</p>
    </div>
  `;
}

function openDrawer(row) {
  drawerSubtitle.textContent = `${safe(row.fullName)} / ${safe(referenceValue(row))}`;

  drawerContent.innerHTML = `
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      ${detailField("Full name", row.fullName)}
      ${detailField("Email", row.email)}
      ${detailField("Phone", row.phone)}
      ${detailField("Company / provider", respondent(row))}
      ${detailField("Reference", referenceValue(row))}
      ${detailField("Booking reference", row.bookingRef)}
      ${detailField("Date", row.flightDate || row.journeyDate || row.travelDate || row.contraventionDate || row.switchDate || row.departureDate)}
      ${detailField("Route", route(row))}
      ${detailField("Distance", row.distance)}
      ${detailField("Delay duration", row.delayDuration)}
      ${detailField("Issue", row.issueTypeLabel || row.reason)}
      ${detailField("Compensation", formatClaimMoney(row))}
      ${detailField("Payment method", row.paymentMethod)}
      ${detailField("Payment details", row.paymentDetails || row.iban)}
      ${detailField("Language", row.language)}
      ${detailField("Handle option", row.handleOption)}
      ${detailField("Donation", row.donation)}
      ${detailField("Marketing consent", row.marketingConsent ? "Yes" : "No")}
      ${detailField("Status", row.status || "new")}
      ${detailField("File upload", row.fileURL ? `<a href="${row.fileURL}" target="_blank" class="text-blue-600 underline">Open file</a>` : EMPTY_VALUE)}
    </div>

    <div class="border rounded-xl p-3">
      <p class="label">Internal Notes</p>
      <p class="value whitespace-pre-wrap">${safe(row.notes)}</p>
    </div>
  `;

  drawerBackdrop.classList.remove("hidden");
  claimDrawer.classList.remove("hidden");
}

function closeDrawer() {
  drawerBackdrop.classList.add("hidden");
  claimDrawer.classList.add("hidden");
}

async function loadData() {
  const [claimsSnap, leadsSnap, eventsSnap] = await Promise.all([
    getDocs(query(collection(db, "flightClaimLetters"), orderBy("createdAt", "desc"), limit(500))),
    getDocs(query(collection(db, "freeFlightClaimMarketingLeads"), orderBy("createdAt", "desc"), limit(500))),
    getDocs(query(collection(db, "conversionEvents"), orderBy("createdAt", "desc"), limit(800)))
  ]);

  claimsData = claimsSnap.docs.map(docSnap => ({
    id: docSnap.id,
    ...docSnap.data()
  }));

  leadsData = leadsSnap.docs.map(docSnap => ({
    id: docSnap.id,
    ...docSnap.data()
  }));

  conversionData = eventsSnap.docs.map(docSnap => ({
    id: docSnap.id,
    ...docSnap.data()
  }));

  document.getElementById("claimsCount").textContent = filteredClaims().length;
  updateDashboardStats();
  document.getElementById("newClaimsCount").textContent =
    filteredClaims().filter(c => (c.status || "new") === "new").length;
  document.getElementById("lastUpdated").textContent = new Date().toLocaleString();

  renderConversions();
  renderClaims();
  renderLeads();
  renderEvents();
}

function switchView() {
  const view = viewSelect.value;

  claimsSection.classList.toggle("hidden", view !== "claims");
  leadsSection.classList.toggle("hidden", view !== "leads");
  eventsSection.classList.toggle("hidden", view !== "events");

  statusFilter.disabled = view !== "claims";

  renderClaims();
  renderLeads();
  renderEvents();
}

function exportCSV() {
  const data = viewSelect.value === "claims"
    ? filteredClaims()
    : viewSelect.value === "leads"
      ? filteredLeads()
      : filteredEvents();

  const filename = `${viewSelect.value}-export.csv`;

  const headers = [
    "date",
    "product",
    "eventName",
    "fullName",
    "email",
    "phone",
    "airline",
    "flightNumber",
    "depAirport",
    "arrAirport",
    "compensation",
    "marketingConsent",
    "status",
    "notes"
  ];

  const rows = data.map(row => {
    return headers.map(header => {
      let value =
        header === "date"
          ? formatDate(row.createdAt || row.submittedAt || row.consentCapturedAt)
          : row[header];

      value = value == null ? "" : String(value).replace(/"/g, '""');
      return `"${value}"`;
    }).join(",");
  });

  const csv = [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  loginError.classList.add("hidden");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    console.error("LOGIN ERROR:", err.code, err.message);
    loginError.textContent = `${err.code}: ${err.message}`;
    loginError.classList.remove("hidden");
  }
});

logoutBtn.addEventListener("click", () => signOut(auth));
refreshBtn.addEventListener("click", loadData);
exportCsvBtn.addEventListener("click", exportCSV);

viewSelect.addEventListener("change", switchView);
searchInput.addEventListener("input", () => {
  renderClaims();
  renderLeads();
  renderEvents();
  renderConversions();
});
statusFilter.addEventListener("change", () => {
  renderClaims();
  renderConversions();
});
productFilter.addEventListener("change", () => {
  renderClaims();
  renderLeads();
  renderEvents();
  renderConversions();
});

closeDrawerBtn.addEventListener("click", closeDrawer);
drawerBackdrop.addEventListener("click", closeDrawer);

onAuthStateChanged(auth, async (user) => {
  let isAllowedAdmin = false;

  if (user) {
    try {
      const userSnap = await getDoc(doc(db, "users", user.uid));
      const profile = userSnap.exists() ? userSnap.data() : {};
      isAllowedAdmin = allowedAdmins.includes(user.email) || profile.role === "admin" || profile.admin === true;
    } catch (error) {
      console.error("Admin access check failed:", error);
      loginError.textContent = `Admin access check failed: ${error.code || error.message || "Unknown error"}`;
      loginError.classList.remove("hidden");
    }
  }

  if (user && isAllowedAdmin) {
    loginView.classList.add("hidden");
    dashboardView.classList.remove("hidden");
    logoutBtn.classList.remove("hidden");

    await loadData();
  } else {
    if (user) await signOut(auth);

    dashboardView.classList.add("hidden");
    loginView.classList.remove("hidden");
    logoutBtn.classList.add("hidden");
  }
});
</script>
