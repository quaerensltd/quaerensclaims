<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Quaerens</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --soft: #f8fafc;
      --panel: #ffffff;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34rem),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 42%, #eef2f7 100%);
      margin: 0;
      padding: 0;
      color: var(--ink);
      min-height: 100vh;
    }

    a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover { text-decoration: underline; }

    .admin-topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 4vw, 3rem);
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      backdrop-filter: blur(12px);
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    .logo {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    .eyebrow {
      margin: 0 0 0.15rem;
      color: var(--blue);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.6vw, 2.05rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0.65rem 1.1rem;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e40af;
      font-weight: 800;
      text-decoration: none;
    }

    .admin-shell {
      width: min(1420px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    .login-card {
      max-width: 460px;
      margin: 4rem auto;
      background: var(--panel);
      padding: 2rem;
      border-radius: 22px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .login-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
    }

    .login-card p {
      margin: 0 0 1.4rem;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 0.45rem;
      color: #1e293b;
      font-weight: 800;
      font-size: 0.9rem;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      padding: 0.7rem 0.85rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .form-field { margin-bottom: 1rem; }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      min-height: 42px;
      padding: 0.65rem 1.1rem;
      background-color: var(--blue);
      color: white;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.18);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .button:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.24);
    }

    .button.secondary {
      background: #ffffff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
      box-shadow: none;
    }

    .button.secondary:hover {
      background: #eff6ff;
      box-shadow: none;
    }

    #loginButton {
      width: 100%;
      margin-top: 0.25rem;
    }

    #loginStatus {
      margin-top: 1rem;
      color: var(--danger);
      font-weight: 700;
      min-height: 1.3rem;
    }

    .sticky-bar {
      position: sticky;
      top: 81px;
      z-index: 30;
      background: rgba(248, 250, 252, 0.94);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) minmax(260px, 1.2fr);
      gap: 1rem;
      align-items: end;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .summary-line {
      margin: 0.7rem 0 0;
      color: #334155;
      font-weight: 800;
    }

    .table-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .table-title h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    .table-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .table-container {
      overflow: auto;
      max-height: 68vh;
      background: white;
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 0.85rem 0.9rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #f8fafc;
      color: #475569;
      position: sticky;
      top: 0;
      z-index: 2;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      font-size: 0.9rem;
      color: #1e293b;
      line-height: 1.5;
    }

    tbody tr:hover { background: #eff6ff; }

    .status-select {
      min-height: 36px;
      padding: 0.35rem 0.5rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      width: auto;
    }

    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #111827;
      color: white;
      padding: 1rem 1.25rem;
      border-radius: 14px;
      box-shadow: 0 16px 34px rgba(0,0,0,0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(-8px);
      z-index: 1000;
      font-weight: 700;
    }

    #toast.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .toolbar-grid { grid-template-columns: 1fr; }
      .sticky-bar { top: 76px; }
    }

    @media (max-width: 720px) {
      .admin-topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .admin-shell {
        width: min(100% - 1rem, 1420px);
        padding-top: 1rem;
      }

      .logo { height: 42px; }
      .login-card { margin: 1.5rem auto; padding: 1.35rem; }
      .sticky-bar { position: static; border-radius: 16px; }
      .table-title { align-items: flex-start; flex-direction: column; }
    }
  </style>

<style>
  /* Quaerens persistent language switcher */
  .quaerens-language-switcher {
    position: fixed;
    right: 1rem;
    top: 5.25rem;
    z-index: 70;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: rgba(255,255,255,0.96);
    border: 1px solid #dbeafe;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    padding: 0.45rem 0.55rem 0.45rem 0.8rem;
    font-family: Inter, Arial, sans-serif;
  }

  .quaerens-language-switcher label {
    font-size: 0.78rem;
    font-weight: 800;
    color: #1e3a8a;
  }

  .quaerens-language-switcher select {
    border: 0;
    background: transparent;
    color: #111827;
    font-weight: 700;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    max-width: 8.8rem;
  }

  .goog-te-banner-frame.skiptranslate,
  .goog-logo-link,
  .goog-te-gadget,
  body > .skiptranslate {
    display: none !important;
  }

  body {
    top: 0 !important;
  }

  @media (max-width: 768px) {
    .quaerens-language-switcher {
      top: 4.35rem;
      right: 0.75rem;
      padding: 0.38rem 0.5rem 0.38rem 0.65rem;
    }

    .quaerens-language-switcher label {
      display: none;
    }

    .quaerens-language-switcher select {
      max-width: 7.6rem;
      font-size: 0.78rem;
    }
  }
</style>
<script>
  // Quaerens persistent language switcher
  function quaerensSetLanguage(lang) {
    var value = lang === 'en' ? '' : '/en/' + lang;
    var expires = '; expires=' + new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toUTCString();
    var hostname = window.location.hostname;
    document.cookie = 'googtrans=' + value + expires + '; path=/';
    if (hostname) {
      document.cookie = 'googtrans=' + value + expires + '; domain=' + hostname + '; path=/';
      var parts = hostname.split('.');
      if (parts.length > 2) {
        document.cookie = 'googtrans=' + value + expires + '; domain=.' + parts.slice(-2).join('.') + '; path=/';
      }
    }
    localStorage.setItem('quaerensLanguage', lang);
    window.location.reload();
  }

  function quaerensReadTranslateCookie() {
    var match = document.cookie.match(/(?:^|; )googtrans=([^;]*)/);
    if (!match) return '';
    var decoded = decodeURIComponent(match[1]);
    var parts = decoded.split('/');
    return parts.length >= 3 ? parts[2] : '';
  }

  function quaerensInitLanguageSelect() {
    var select = document.getElementById('quaerensLanguageSelect');
    if (!select) return;
    var lang = quaerensReadTranslateCookie() || localStorage.getItem('quaerensLanguage') || 'en';
    select.value = lang;
  }

  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,nl,es,fr,de,it,sv,el',
      autoDisplay: false
    }, 'google_translate_element');
    quaerensInitLanguageSelect();
  }

  document.addEventListener('DOMContentLoaded', quaerensInitLanguageSelect);
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>
<body>

<!-- Quaerens persistent language switcher -->
<div id="google_translate_element" style="display:none;"></div>
<div class="quaerens-language-switcher" aria-label="Language selector">
  <label for="quaerensLanguageSelect">Language</label>
  <select id="quaerensLanguageSelect" onchange="quaerensSetLanguage(this.value)">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="it">Italiano</option>
    <option value="sv">Svenska</option>
    <option value="el">Ελληνικά</option>
  </select>
</div>

  <header class="admin-topbar">
    <div class="brand-lockup">
      <img src="/images/quaerens-logo.png" alt="Quaerens Logo" class="logo" />
      <div>
        <p class="eyebrow">Secure admin area</p>
        <h1>Admin Dashboard</h1>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="home-link" href="/">Home</a>
    </div>
  </header>

  <main class="admin-shell">
    <section id="loginForm" class="login-card">
      <p class="eyebrow">Team sign in</p>
      <h2>Access the dashboard</h2>
      <p>Sign in to review submissions, update statuses, export records and manage incoming claim activity.</p>

      <div class="form-field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="name@quaerens.co.uk" autocomplete="email" required />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>

      <button class="button" id="loginButton" onclick="login()">Login</button>
      <div id="loginStatus"></div>
    </section>

    <section style="display:none" id="adminContent" class="admin-content">
      <div class="sticky-bar">
        <div class="toolbar-grid">
          <div>
            <label for="collectionSelector">Claim type</label>
            <select id="collectionSelector" onchange="loadClaims()">
              <option value="claims">General</option>
              <option value="fullServiceRequests">Full Service</option>
              <option value="flightClaims">Flight</option>
              <option value="checkout">DIY Kit Checkouts</option>
            </select>
          </div>

          <div>
            <label for="statusFilter">Status filter</label>
            <select id="statusFilter" onchange="loadClaims()">
              <option value="all">All</option>
              <option value="pending">Pending</option>
              <option value="resolved">Resolved</option>
            </select>
          </div>

          <div>
            <label for="searchInput">Search records</label>
            <input
              type="text"
              id="searchInput"
              placeholder="Search name, email, type or reference"
              oninput="loadClaims()"
            />
            <p id="claimSummary" class="summary-line"></p>
          </div>
        </div>

        <div class="toolbar-actions">
          <button class="button secondary" onclick="submitTestClaim()">Submit Test Claim</button>
          <button class="button secondary" onclick="exportCSV()">Export CSV</button>
          <button class="button" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="table-card">
        <div class="table-title">
          <div>
            <h2>Submission Records</h2>
            <p>Use the filters above to review and manage the selected collection.</p>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead id="claimsHeader"></thead>
            <tbody id="claimsBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentSortColumn = null;
    let currentSortDirection = "desc";

    const loginForm = document.getElementById("loginForm");
    const adminContent = document.getElementById("adminContent");
    const table = document.getElementById("claimsBody");
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    onAuthStateChanged(auth, user => {
      if (user) {
        loginForm.style.display = "none";
        adminContent.style.display = "block";
        loadClaims();
      } else {
        loginForm.style.display = "block";
        adminContent.style.display = "none";
      }
    });

    window.logout = function () {
      signOut(auth).then(() => {
        showToast("👋 Logged out.");
        loginForm.style.display = "block";
        adminContent.style.display = "none";
      });
    };

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => showToast("✅ Logged in."))
        .catch(err => showToast("❌ " + err.message));
    };

    window.sortTable = function (columnIndex) {
      const tableEl = document.querySelector("table");
      const rows = Array.from(tableEl.rows).slice(1);
      const type = tableEl.rows[0]?.cells[columnIndex]?.textContent.trim();
      const isDate = type === "Date";

      rows.sort((a, b) => {
        const aText = a.cells[columnIndex]?.textContent.trim() || "";
        const bText = b.cells[columnIndex]?.textContent.trim() || "";
        if (isDate) return new Date(aText) - new Date(bText);
        return aText.localeCompare(bText, undefined, { numeric: true });
      });

      if (currentSortColumn === columnIndex && currentSortDirection === "asc") {
        rows.reverse();
        currentSortDirection = "desc";
      } else {
        currentSortDirection = "asc";
      }

      currentSortColumn = columnIndex;

      const tbody = tableEl.querySelector("tbody");
      tbody.innerHTML = "";
      rows.forEach(row => tbody.appendChild(row));
      updateHeaderArrows(columnIndex);
    };

    function updateTableHeader(collectionName) {
      const header = document.getElementById("claimsHeader");
      if (!header) return;

      let headers = [];

      if (collectionName === "claims" || collectionName === "flightClaims") {
        headers = ["Date", "Name", "Email", "Type", "Phone", "Details", "Status", "Change", "Attachment", "Actions"];
      } else if (collectionName === "checkout") {
        headers = ["Date", "Name", "Email", "Country", "Phone", "Details", "Status", "Change", "Attachment", "Actions"];
      } else if (collectionName === "fullServiceRequests") {
        headers = ["Date", "Title", "Name", "Email", "Phone", "Resort", "Details", "Status", "Change", "Attachment", "Actions"];
      } else {
        headers = ["Date", "Name", "Email", "Type", "Phone", "Details", "Status", "Change", "Attachment", "Actions"];
      }

      header.innerHTML = `
        <tr>
          ${headers.map((h, index) => `<th onclick="sortTable(${index})" style="cursor:pointer;">${h}</th>`).join("")}
        </tr>
      `;
    }

    function updateHeaderArrows(activeIndex) {
      const headers = document.querySelectorAll("thead th");
      headers.forEach((th, i) => {
        const baseText = th.textContent.replace(/[\u25B2\u25BC]/g, "").trim();
        if (i === activeIndex) {
          th.innerHTML = baseText + (currentSortDirection === "asc" ? " ▲" : " ▼");
        } else {
          th.innerHTML = baseText;
        }
      });
    }

    function extractField(html, label) {
      const match = html?.match(new RegExp(`<strong>${label}:<\\/strong>\\s*([^<]*)`, "i"));
      return match ? match[1].trim() : "-";
    }

    function extractAttachment(html) {
      const match = html?.match(/<a href="(.*?)".*?>/i);
      return match ? match[1] : "";
    }

    async function loadClaims() {
      try {
        const selectedCollection = document.getElementById("collectionSelector").value || "claims";
        const filter = document.getElementById("statusFilter").value;
        const searchTerm = document.getElementById("searchInput")?.value?.toLowerCase() || "";

        updateTableHeader(selectedCollection);

        const snapshot = await getDocs(collection(db, selectedCollection));
        table.innerHTML = "";

        let docs = snapshot.docs.map(docSnap => ({
          id: docSnap.id,
          ...docSnap.data()
        }));

        docs.sort((a, b) => {
          const aTime = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const bTime = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
          return bTime - aTime;
        });

        let total = 0;
        let pending = 0;
        let resolved = 0;

        docs.forEach(data => {
          let name = data.name || "-";
          let email = data.email || data.to || "-";
          let type = data.type || data.claimType || data.resort || "-";
          let phone = data.phone || "-";
          let details = data.details || "-";
          let fileUrl = data.fileUrl || "";
          let status = (data.status || "pending").toString().toLowerCase();
          const docId = data.id;

          if (data.html) {
            const extractedTitle = extractField(data.html, "Title");
            const extractedName = extractField(data.html, "Name");
            const extractedEmail = extractField(data.html, "Email");
            const extractedPhone = extractField(data.html, "Phone");
            const extractedType = extractField(data.html, "Claim Type");
            const extractedDetails = extractField(data.html, "Details");

            name = extractedTitle !== "-" && extractedName !== "-"
              ? `${extractedTitle} ${extractedName}`.trim()
              : (extractedName !== "-" ? extractedName : name);

            email = extractedEmail !== "-" ? extractedEmail : email;
            phone = extractedPhone !== "-" ? extractedPhone : phone;
            type = extractedType !== "-" ? extractedType : type;
            details = extractedDetails !== "-" ? extractedDetails : details;

            const extractedAttachment = extractAttachment(data.html);
            if (extractedAttachment) fileUrl = extractedAttachment;
          }

          const matchesSearch =
            name.toLowerCase().includes(searchTerm) ||
            email.toLowerCase().includes(searchTerm) ||
            type.toLowerCase().includes(searchTerm);

          if ((filter !== "all" && status !== filter) || (searchTerm && !matchesSearch)) {
            return;
          }

          total++;
          if (status === "pending") pending++;
          if (status === "resolved") resolved++;

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${data.createdAt?.toDate ? data.createdAt.toDate().toLocaleString() : "-"}</td>
            <td>${name}</td>
            <td>${email}</td>
            <td>${type}</td>
            <td>${phone}</td>
            <td>${details}</td>
            <td>
              <span style="
                display: inline-block;
                padding: 0.25rem 0.5rem;
                border-radius: 9999px;
                font-size: 0.75rem;
                font-weight: 600;
                color: white;
                background-color: ${status === 'resolved' ? '#10b981' : '#f59e0b'};
              ">
                ${status === 'resolved' ? 'Resolved' : 'Pending'}
              </span>
            </td>
            <td>
              <select class="status-select" onchange="updateStatus('${docId}', this.value)">
                <option value="pending" ${status === "pending" ? "selected" : ""}>Pending</option>
                <option value="resolved" ${status === "resolved" ? "selected" : ""}>Resolved</option>
              </select>
            </td>
            <td>${fileUrl ? `<a href="${fileUrl}" target="_blank">Download</a>` : "-"}</td>
            <td>
              <a href="/claim-detail.html?id=${docId}" target="_blank">View</a>
              <a href="/claim-detail.html?id=${docId}&pdf=true" target="_blank">PDF</a>
              <a href="#" onclick="deleteClaim('${docId}')" style="color:red;">Delete</a>
            </td>
          `;
          table.appendChild(row);
        });

        const summaryElement = document.getElementById("claimSummary");
        if (summaryElement) {
          summaryElement.innerText = `Showing ${total} claim(s): ${pending} pending, ${resolved} resolved`;
        }

        window.updateStatus = async function (id, newStatus) {
          const ref = doc(db, selectedCollection, id);
          await updateDoc(ref, { status: newStatus });
          loadClaims();
        };

        window.deleteClaim = async function (id) {
          if (confirm("Are you sure you want to delete this claim?")) {
            await deleteDoc(doc(db, selectedCollection, id));
            showToast("🗑️ Claim deleted.");
            loadClaims();
          }
        };
      } catch (error) {
  console.error("loadClaims error:", error);
  showToast("❌ " + (error?.message || "Could not load claims."));
}
    }

    window.exportCSV = function () {
      const rows = [[
        "Date", "Name", "Email", "Type", "Phone", "Details", "Status",
        "Attachment URL", "Claim View URL", "PDF URL"
      ]];

      const tableRows = document.getElementById("claimsBody").querySelectorAll("tr");

      tableRows.forEach(tr => {
        const cells = tr.querySelectorAll("td");
        if (cells.length >= 10) {
          const clean = text => `"${(text || "-").replace(/\n/g, ' ').replace(/"/g, '""')}"`;
          const attachmentLink = cells[8].querySelector("a")?.href || "-";
          const claimLinks = cells[9].querySelectorAll("a");

          let viewLink = "-";
          let pdfLink = "-";

          claimLinks.forEach(link => {
            if (link.href.includes("&pdf=true")) pdfLink = link.href;
            else if (link.href.includes("claim-detail.html")) viewLink = link.href;
          });

          rows.push([
            clean(cells[0].innerText),
            clean(cells[1].innerText),
            clean(cells[2].innerText),
            clean(cells[3].innerText),
            clean(cells[4].innerText),
            clean(cells[5].innerText),
            clean(cells[6].innerText),
            clean(attachmentLink),
            clean(viewLink),
            clean(pdfLink)
          ]);
        }
      });

      const csv = rows.map(r => r.join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "claims.csv";
      a.click();
      showToast("📄 CSV downloaded");
      URL.revokeObjectURL(url);
    };

    window.submitTestClaim = async function () {
      const random = Math.floor(Math.random() * 10000);
      await addDoc(collection(db, "claims"), {
        name: `Test User ${random}`,
        email: `test${random}@email.com`,
        phone: "+441234567890",
        type: "Test Submission",
        details: "This is a test claim to verify the system end-to-end.",
        fileUrl: "",
        createdAt: Timestamp.now(),
        status: "pending"
      });
      showToast("✅ Test claim submitted.");
      loadClaims();
    };

    loadClaims();
  </script>
</body>
</html>
