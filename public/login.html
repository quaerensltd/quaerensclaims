<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaerens Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card {
      background: white;
      border: 1px solid #dbeafe;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      outline: none;
    }
    .input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .btn {
      width: 100%;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-weight: 700;
      background: #2563eb;
      color: white;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .hidden { display: none; }
  </style>

</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

  <main class="w-full max-w-md">
    <div class="text-center mb-6">
      <a href="/" class="inline-flex items-center justify-center">
        <img src="/images/quaerens-logo.png" alt="Quaerens" class="h-16 w-auto mx-auto" />
      </a>
      <p class="mt-4 text-sm font-bold uppercase tracking-wide text-blue-700">Secure CRM access</p>
      <h1 class="text-3xl font-extrabold text-slate-900 mt-2">Sign in to Quaerens</h1>
      <p class="text-slate-600 mt-2">Use your staff account to access the correct dashboard.</p>
    </div>

    <form id="loginForm" class="card p-6 space-y-5">
      <div>
        <label for="email" class="block text-sm font-bold text-slate-800 mb-2">Email address</label>
        <input class="input" type="email" id="email" name="email" autocomplete="email" required />
      </div>

      <div>
        <label for="password" class="block text-sm font-bold text-slate-800 mb-2">Password</label>
        <input class="input" type="password" id="password" name="password" autocomplete="current-password" required />
      </div>

      <button class="btn" id="loginBtn" type="submit">Log In</button>
      <p id="message" class="hidden text-sm font-semibold text-center"></p>
    </form>
  </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const message = document.getElementById("message");

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.classList.remove("hidden", "text-red-600", "text-green-700", "text-slate-500");
      message.classList.add(isError ? "text-red-600" : "text-green-700");
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Logging in..." : "Log In";
    }

    function getSafeReturnPath() {
      const params = new URLSearchParams(window.location.search);
      const requested = params.get("next") || sessionStorage.getItem("crmReturnTo") || "";
      if (requested === "/agenda.html") return requested;
      if (requested.startsWith("/client-file.html")) return requested;
      return "";
    }

    function getTodayAttendanceId(uid) {
      const today = new Date().toISOString().slice(0, 10);
      return `${uid}_${today}`;
    }

    async function recordStaffLogin(user, userData) {
      if (userData.role !== "staff") return;

      const today = new Date().toISOString().slice(0, 10);
      const attendanceId = getTodayAttendanceId(user.uid);
      const attendanceRef = doc(db, "staffAttendance", attendanceId);
      const attendanceSnap = await getDoc(attendanceRef);

      if (!attendanceSnap.exists()) {
        await setDoc(attendanceRef, {
          uid: user.uid,
          name: userData.name || "",
          email: user.email || "",
          role: userData.role || "staff",
          date: today,
          firstLoginAt: serverTimestamp(),
          lastLoginAt: serverTimestamp(),
          isOnline: true
        });
      } else {
        await setDoc(attendanceRef, {
          uid: user.uid,
          name: userData.name || "",
          email: user.email || "",
          role: userData.role || "staff",
          date: today,
          lastLoginAt: serverTimestamp(),
          isOnline: true
        }, { merge: true });
      }
    }

    async function redirectByRole(user, userData) {
      const role = userData.role;
      const returnPath = getSafeReturnPath();

      if (returnPath && ["manager", "staff", "closer", "processing", "admin"].includes(role)) {
        if (role === "staff") {
          try {
            await recordStaffLogin(user, userData);
          } catch (attendanceError) {
            console.error("Attendance logging failed:", attendanceError);
          }
        }
        sessionStorage.removeItem("crmReturnTo");
        window.location.href = returnPath;
        return;
      }

      if (role === "manager") {
        window.location.href = "/manager-dashboard.html";
        return;
      }

      if (role === "staff") {
        try {
          await recordStaffLogin(user, userData);
        } catch (attendanceError) {
          console.error("Attendance logging failed:", attendanceError);
        }
        window.location.href = "/staff-dashboard.html";
        return;
      }

      if (role === "closer") {
        window.location.href = "/closer-dashboard.html";
        return;
      }

      if (role === "processing") {
        window.location.href = "/processing-dashboard.html";
        return;
      }

      await signOut(auth);
      showMessage("No valid role found for this account.", true);
      setLoading(false);
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Please enter your email and password.", true);
        return;
      }

      try {
        setLoading(true);
        showMessage("Checking account...");

        const credential = await signInWithEmailAndPassword(auth, email, password);
        const user = credential.user;

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await signOut(auth);
          showMessage("No user profile found for this account.", true);
          setLoading(false);
          return;
        }

        const userData = userSnap.data();
        await redirectByRole(user, userData);
      } catch (error) {
        console.error("Login failed:", error);

        if (error.code === "auth/invalid-credential") {
          showMessage("Invalid email or password.", true);
        } else if (error.code === "auth/user-not-found") {
          showMessage("No account found with that email.", true);
        } else if (error.code === "auth/wrong-password") {
          showMessage("Incorrect password.", true);
        } else if (error.code === "auth/invalid-email") {
          showMessage("Please enter a valid email address.", true);
        } else if (error.code === "auth/too-many-requests") {
          showMessage("Too many attempts. Please try again later.", true);
        } else {
          showMessage(error.message || "Could not log in. Please try again.", true);
        }

        setLoading(false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) return;

        const userData = userSnap.data();
        await redirectByRole(user, userData);
      } catch (error) {
        console.error("Auto-redirect failed:", error);
      }
    });
  </script>
</body>
</html>
