<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaerens Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card {
      background: white;
      border: 1px solid #dbeafe;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      outline: none;
    }
    .input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .btn {
      width: 100%;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-weight: 700;
      background: #2563eb;
      color: white;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .hidden { display: none; }
  </style>

<style>
  /* Quaerens persistent language switcher */
  .quaerens-language-switcher {
    position: fixed;
    right: 1rem;
    top: 5.25rem;
    z-index: 70;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: rgba(255,255,255,0.96);
    border: 1px solid #dbeafe;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    padding: 0.45rem 0.55rem 0.45rem 0.8rem;
    font-family: Inter, Arial, sans-serif;
  }

  .quaerens-language-switcher label {
    font-size: 0.78rem;
    font-weight: 800;
    color: #1e3a8a;
  }

  .quaerens-language-switcher select {
    border: 0;
    background: transparent;
    color: #111827;
    font-weight: 700;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    max-width: 8.8rem;
  }

  .goog-te-banner-frame.skiptranslate,
  .goog-logo-link,
  .goog-te-gadget,
  body > .skiptranslate {
    display: none !important;
  }

  body {
    top: 0 !important;
  }

  @media (max-width: 768px) {
    .quaerens-language-switcher {
      top: 4.35rem;
      right: 0.75rem;
      padding: 0.38rem 0.5rem 0.38rem 0.65rem;
    }

    .quaerens-language-switcher label {
      display: none;
    }

    .quaerens-language-switcher select {
      max-width: 7.6rem;
      font-size: 0.78rem;
    }
  }
</style>
<script>
  // Quaerens persistent language switcher
  function quaerensSetLanguage(lang) {
    var value = lang === 'en' ? '' : '/en/' + lang;
    var expires = '; expires=' + new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toUTCString();
    var hostname = window.location.hostname;
    document.cookie = 'googtrans=' + value + expires + '; path=/';
    if (hostname) {
      document.cookie = 'googtrans=' + value + expires + '; domain=' + hostname + '; path=/';
      var parts = hostname.split('.');
      if (parts.length > 2) {
        document.cookie = 'googtrans=' + value + expires + '; domain=.' + parts.slice(-2).join('.') + '; path=/';
      }
    }
    localStorage.setItem('quaerensLanguage', lang);
    window.location.reload();
  }

  function quaerensReadTranslateCookie() {
    var match = document.cookie.match(/(?:^|; )googtrans=([^;]*)/);
    if (!match) return '';
    var decoded = decodeURIComponent(match[1]);
    var parts = decoded.split('/');
    return parts.length >= 3 ? parts[2] : '';
  }

  function quaerensInitLanguageSelect() {
    var select = document.getElementById('quaerensLanguageSelect');
    if (!select) return;
    var lang = quaerensReadTranslateCookie() || localStorage.getItem('quaerensLanguage') || 'en';
    select.value = lang;
  }

  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,nl,es,fr,de,it,sv,el',
      autoDisplay: false
    }, 'google_translate_element');
    quaerensInitLanguageSelect();
  }

  document.addEventListener('DOMContentLoaded', quaerensInitLanguageSelect);
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

<!-- Quaerens persistent language switcher -->
<div id="google_translate_element" style="display:none;"></div>
<div class="quaerens-language-switcher" aria-label="Language selector">
  <label for="quaerensLanguageSelect">Language</label>
  <select id="quaerensLanguageSelect" onchange="quaerensSetLanguage(this.value)">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="it">Italiano</option>
    <option value="sv">Svenska</option>
    <option value="el">Ελληνικά</option>
  </select>
</div>

  <div class="w-full max-w-md">
    <div class="card p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-blue-900">Quaerens Login</h1>
        <p class="text-slate-500 mt-2">Sign in to your dashboard</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-semibold text-blue-900 mb-2">Email</label>
          <input id="email" type="email" class="input" placeholder="you@example.com" required />
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-blue-900 mb-2">Password</label>
          <input id="password" type="password" class="input" placeholder="Enter your password" required />
        </div>

        <button id="loginBtn" type="submit" class="btn">Log In</button>

        <p id="message" class="text-sm text-center hidden"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const message = document.getElementById("message");

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.classList.remove("hidden", "text-red-600", "text-green-700", "text-slate-500");
      message.classList.add(isError ? "text-red-600" : "text-green-700");
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Logging in..." : "Log In";
    }

    function getTodayAttendanceId(uid) {
      const today = new Date().toISOString().slice(0, 10);
      return `${uid}_${today}`;
    }

    async function recordStaffLogin(user, userData) {
      if (userData.role !== "staff") return;

      const today = new Date().toISOString().slice(0, 10);
      const attendanceId = getTodayAttendanceId(user.uid);
      const attendanceRef = doc(db, "staffAttendance", attendanceId);
      const attendanceSnap = await getDoc(attendanceRef);

      if (!attendanceSnap.exists()) {
        await setDoc(attendanceRef, {
          uid: user.uid,
          name: userData.name || "",
          email: user.email || "",
          role: userData.role || "staff",
          date: today,
          firstLoginAt: serverTimestamp(),
          lastLoginAt: serverTimestamp(),
          isOnline: true
        });
      } else {
        await setDoc(attendanceRef, {
          uid: user.uid,
          name: userData.name || "",
          email: user.email || "",
          role: userData.role || "staff",
          date: today,
          lastLoginAt: serverTimestamp(),
          isOnline: true
        }, { merge: true });
      }
    }

    async function redirectByRole(user, userData) {
      const role = userData.role;

      if (role === "manager") {
        window.location.href = "/manager-dashboard.html";
        return;
      }

      if (role === "staff") {
        try {
          await recordStaffLogin(user, userData);
        } catch (attendanceError) {
          console.error("Attendance logging failed:", attendanceError);
        }
        window.location.href = "/staff-dashboard.html";
        return;
      }

      if (role === "closer") {
        window.location.href = "/closer-dashboard.html";
        return;
      }

      if (role === "processing") {
        window.location.href = "/processing-dashboard.html";
        return;
      }

      await signOut(auth);
      showMessage("No valid role found for this account.", true);
      setLoading(false);
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Please enter your email and password.", true);
        return;
      }

      try {
        setLoading(true);
        showMessage("Checking account...");

        const credential = await signInWithEmailAndPassword(auth, email, password);
        const user = credential.user;

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await signOut(auth);
          showMessage("No user profile found for this account.", true);
          setLoading(false);
          return;
        }

        const userData = userSnap.data();
        await redirectByRole(user, userData);
      } catch (error) {
        console.error("Login failed:", error);

        if (error.code === "auth/invalid-credential") {
          showMessage("Invalid email or password.", true);
        } else if (error.code === "auth/user-not-found") {
          showMessage("No account found with that email.", true);
        } else if (error.code === "auth/wrong-password") {
          showMessage("Incorrect password.", true);
        } else if (error.code === "auth/invalid-email") {
          showMessage("Please enter a valid email address.", true);
        } else if (error.code === "auth/too-many-requests") {
          showMessage("Too many attempts. Please try again later.", true);
        } else {
          showMessage(error.message || "Could not log in. Please try again.", true);
        }

        setLoading(false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) return;

        const userData = userSnap.data();
        await redirectByRole(user, userData);
      } catch (error) {
        console.error("Auto-redirect failed:", error);
      }
    });
  </script>
</body>
</html>
