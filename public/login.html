<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaerens Staff Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { background: white; border: 1px solid #dbeafe; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .input { width: 100%; border: 1px solid #cbd5e1; border-radius: 12px; padding: 0.85rem 1rem; }
    .input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn { border-radius: 12px; padding: 0.9rem 1rem; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md card p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-blue-900">Quaerens Staff Login</h1>
      <p class="text-slate-500 mt-2">Secure access for staff, managers, closers and processing</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-blue-900 mb-2" for="email">Email address</label>
        <input id="email" type="email" class="input" placeholder="name@quaerens.co.uk" required />
      </div>

      <div>
        <label class="block text-sm font-semibold text-blue-900 mb-2" for="password">Password</label>
        <input id="password" type="password" class="input" placeholder="Enter password" required />
      </div>

      <button id="loginBtn" type="submit" class="btn btn-primary w-full">
        Log In
      </button>

      <p id="loginError" class="text-sm text-red-600 hidden"></p>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOo_Sa242sUuGyZD8jO8kk12V1aBX7wMA",
      authDomain: "quaerensclaims.firebaseapp.com",
      projectId: "quaerensclaims"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const loginError = document.getElementById("loginError");

    function showError(message) {
      loginError.textContent = message;
      loginError.classList.remove("hidden");
    }

    function hideError() {
      loginError.textContent = "";
      loginError.classList.add("hidden");
    }

    async function redirectByRole(user) {
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        await signOut(auth);
        showError("No staff profile found for this account.");
        return;
      }

      const userData = userSnap.data();
      const role = userData.role;

      if (role === "staff") {
        window.location.href = "/lister-leads.html";
        return;
      }

      if (role === "manager") {
        window.location.href = "/manager-panel.html";
        return;
      }

      if (role === "closer") {
        window.location.href = "/closer-panel.html";
        return;
      }

      if (role === "processing") {
        window.location.href = "/processing-dashboard.html";
        return;
      }

      await signOut(auth);
      showError("This account does not have a valid role.");
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      try {
        await redirectByRole(user);
      } catch (error) {
        console.error("Role redirect failed:", error);
        showError("Could not verify access.");
      }
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      hideError();
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const credential = await signInWithEmailAndPassword(auth, email, password);
        await redirectByRole(credential.user);
      } catch (error) {
        console.error("Login failed:", error);
        showError("Login failed. Please check your email, password, and staff role.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Log In";
      }
    });
  </script>
</body>
</html>
