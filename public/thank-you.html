<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Your Claim Letter Is Ready | FreeFlightClaim.com</title>
  <meta name="robots" content="noindex, follow" />

  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* FINAL LEVEL FLIGHT ANIMATION */
    .flight-scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .flight-path-wrap {
      position: absolute;
      top: 120px;
      left: 0;
      width: 100vw;
      height: 320px;
      opacity: 0.95;
    }

    .flight-route-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .flight-route-line {
      fill: none;
      stroke: rgba(255, 255, 255, 0.45);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 10 12;
      animation: routeDash 8s linear infinite;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
    }

    .airport-dot {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #facc15;
      box-shadow: 0 0 0 8px rgba(250, 204, 21, 0.18), 0 0 18px rgba(250, 204, 21, 0.7);
      animation: dotPulse 1.8s ease-in-out infinite;
    }

    .airport-dot.start {
      left: 6%;
      top: 222px;
    }

    .airport-dot.end {
      right: 8%;
      top: 82px;
      animation-delay: 0.6s;
    }

    .airport-label {
      position: absolute;
      background: rgba(255, 255, 255, 0.94);
      color: #1e3a8a;
      border: 1px solid rgba(191, 219, 254, 0.9);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
      white-space: nowrap;
    }

    .airport-label.start {
      left: 4%;
      top: 248px;
    }

    .airport-label.end {
      right: 5%;
      top: 108px;
    }

    .animated-plane {
      position: absolute;
      width: 118px;
      height: 118px;
      left: -160px;
      top: 235px;
      animation: finalFlight 8.5s cubic-bezier(.22,.72,.2,1) forwards;
      filter: drop-shadow(0 16px 18px rgba(15, 23, 42, 0.28));
    }

    .animated-plane svg {
      width: 118px;
      height: 118px;
      transform: rotate(-12deg);
    }

    .plane-window {
      animation: windowGlow 1.5s ease-in-out infinite;
    }

    .smoke-cloud {
      position: absolute;
      left: -20px;
      top: 57px;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: rgba(226, 232, 240, 0.65);
      filter: blur(4px);
      opacity: 0;
      animation: smokeTrail 1.7s ease-out infinite;
    }

    .smoke-cloud.s2 {
      left: -36px;
      top: 65px;
      animation-delay: 0.32s;
    }

    .smoke-cloud.s3 {
      left: -54px;
      top: 50px;
      animation-delay: 0.64s;
    }

    .hero-content {
      position: relative;
      z-index: 5;
    }

    @keyframes routeDash {
      to { stroke-dashoffset: -260; }
    }

    @keyframes dotPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(250, 204, 21, 0.18), 0 0 18px rgba(250, 204, 21, 0.7);
      }
      50% {
        transform: scale(1.18);
        box-shadow: 0 0 0 14px rgba(250, 204, 21, 0.1), 0 0 28px rgba(250, 204, 21, 0.9);
      }
    }

    @keyframes finalFlight {
      0% {
        transform: translate(0, 0) rotate(5deg) scale(0.82);
        opacity: 0;
      }
      7% {
        opacity: 1;
      }
      28% {
        transform: translate(28vw, -150px) rotate(-8deg) scale(0.95);
      }
      58% {
        transform: translate(60vw, -55px) rotate(8deg) scale(1);
      }
      82% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(100vw + 260px), -215px) rotate(-10deg) scale(0.9);
        opacity: 0;
      }
    }

    @keyframes smokeTrail {
      0% {
        transform: translateX(35px) scale(0.35);
        opacity: 0;
      }
      30% {
        opacity: 0.55;
      }
      100% {
        transform: translateX(-65px) scale(2.2);
        opacity: 0;
      }
    }

    @keyframes windowGlow {
      0%, 100% { fill: #facc15; opacity: 0.95; }
      50% { fill: #fde68a; opacity: 1; }
    }

    @media (max-width: 640px) {
      .flight-path-wrap {
        top: 80px;
        height: 240px;
      }

      .animated-plane {
        width: 82px;
        height: 82px;
        top: 180px;
      }

      .animated-plane svg {
        width: 82px;
        height: 82px;
      }

      .airport-label {
        font-size: 10px;
        padding: 5px 9px;
      }

      .airport-dot.start {
        top: 176px;
      }

      .airport-dot.end {
        top: 70px;
      }

      .airport-label.start {
        top: 202px;
      }

      .airport-label.end {
        top: 96px;
      }
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800">
